//  PROJECT PAGE RENDER
// ──────────────────────────────────────────────
const PRIORITY_ORDER    = { high: 0, medium: 1, low: 2 };
const PROJ_STATUS_LABEL = { active: '進行中', waiting: '待機中', done: '完了' };

function setProjectFilter(f) {
  S.projectFilter = f;
  document.querySelectorAll('.project-filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderProjectList();
}

function setProjectSort(s) {
  S.projectSort = s;
  document.getElementById('proj-sort-priority').classList.toggle('active', s === 'priority');
  document.getElementById('proj-sort-due').classList.toggle('active', s === 'due');
  renderProjectList();
}

function renderProjectList() {
  const con = document.getElementById('project-list');
  if (!con) return;

  let list = S.projects.filter(p => {
    if (S.projectFilter === 'all') return true;
    return p.status === S.projectFilter;
  });

  if (S.projectSort === 'priority') {
    list = list.slice().sort((a, b) => {
      const pd = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
      if (pd !== 0) return pd;
      if (!a.dueDate && !b.dueDate) return 0;
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    });
  } else {
    list = list.slice().sort((a, b) => {
      if (!a.dueDate && !b.dueDate) return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    });
  }

  if (!list.length) {
    con.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px">プロジェクトがありません</div>`;
    return;
  }

  const tod = today();
  con.innerHTML = list.map(p => {
    const priClass = p.priority === 'high' ? 'badge-high' : p.priority === 'low' ? 'badge-low' : 'badge-medium';
    const stClass  = p.status === 'active' ? 'badge-proj-active' : p.status === 'done' ? 'badge-proj-done' : 'badge-proj-waiting';
    const dueTxt   = p.dueDate
      ? `<span class="${p.dueDate < tod ? 'overdue' : ''}">期日：${p.dueDate}</span>`
      : `<span>期日：未設定</span>`;
    const ptasks    = getProjectTasks(p.id);
    const taskCount = ptasks.length;
    const doneCnt   = ptasks.filter(t => isTaskDone(t)).length;
    const pct       = taskCount ? Math.round(doneCnt / taskCount * 100) : 0;
    const progressBar = taskCount ? `<div style="margin-top:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:2px">
        <span>タスク完了</span><span>${doneCnt}/${taskCount}件 (${pct}%)</span>
      </div>
      <div style="height:5px;border-radius:3px;background:var(--border);overflow:hidden">
        <div style="height:100%;border-radius:3px;background:var(--personal);width:${pct}%;transition:width .3s"></div>
      </div>
    </div>` : '';
    const memoSnip  = p.memo ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;white-space:pre-wrap;word-break:break-all">${h(p.memo.slice(0,80))}${p.memo.length>80?'…':''}</div>` : '';
    return `<div class="project-card">
      <div class="project-card-header">
        <span class="badge badge-sm ${priClass}" style="margin-top:2px">${PRIORITY_LABEL[p.priority] || p.priority}</span>
        <span class="project-card-title">${h(p.title)}</span>
        <span class="badge ${stClass}">${PROJ_STATUS_LABEL[p.status] || p.status}</span>
      </div>
      <div class="project-card-meta">
        ${p.theme ? `<span>テーマ：${h(p.theme)}</span>` : ''}
        ${dueTxt}
        <span>タスク：${taskCount}件</span>
      </div>
      ${memoSnip}
      ${progressBar}
      <div class="project-card-actions">
        <button class="btn btn-sm" onclick="decomposeProject('${p.id}')">🤖 AI分解</button>
        <button class="btn btn-sm" onclick="openProjectModal('${p.id}')">編集</button>
        <button class="btn btn-sm" style="color:var(--high)" onclick="confirmDeleteProject('${p.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

// プロジェクト追加・編集モーダルを開く
function openProjectModal(id) {
  _projectEditId = id;
  const p = id ? getProjectById(id) : null;
  document.getElementById('project-modal-title').textContent = p ? 'プロジェクトを編集' : 'プロジェクトを追加';
  document.getElementById('proj-title').value    = p ? p.title : '';
  document.getElementById('proj-priority').value = p ? (p.priority || 'medium') : 'medium';
  document.getElementById('proj-status').value   = p ? (p.status || 'active') : 'active';
  document.getElementById('proj-due-date').value = p ? (p.dueDate || '') : '';
  document.getElementById('proj-memo').value     = p ? (p.memo || '') : '';
  buildThemeSelect('proj-theme', 'work', p ? (p.theme || '') : '');
  document.getElementById('modal-project-edit').classList.add('open');
}

function saveProject() {
  const title = document.getElementById('proj-title').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }
  const data = {
    title,
    theme:    document.getElementById('proj-theme').value    || null,
    priority: document.getElementById('proj-priority').value,
    status:   document.getElementById('proj-status').value,
    dueDate:  document.getElementById('proj-due-date').value || null,
    memo:     document.getElementById('proj-memo').value.trim(),
  };
  if (_projectEditId) {
    updateProject(_projectEditId, data);
  } else {
    addProject(data);
  }
  closeAllModals();
  renderProjectList();
  showToast(_projectEditId ? 'プロジェクトを更新しました' : 'プロジェクトを追加しました');
}

function confirmDeleteProject(id) {
  const p = getProjectById(id);
  if (!p) return;
  if (!confirm(`「${p.title}」を削除しますか？`)) return;
  deleteProject(id);
  renderProjectList();
  showToast('プロジェクトを削除しました');
}

function openTaskDetail(id) {
  const t = S.tasks.find(t=>t.id===id);
  if (!t) return;
  const goal    = t.goalId    ? S.goals.find(g=>g.id===t.goalId)        : null;
  const project = t.projectId ? S.projects.find(p=>p.id===t.projectId) : null;
  const scaleCls = t.scale==='large'?'badge-scale-large':t.scale==='medium'?'badge-scale-medium':'badge-scale-small';

  document.getElementById('task-detail-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">タイトル</span><strong style="font-size:13px">${h(t.title)}</strong></div>
    <div class="detail-row"><span class="detail-label">カテゴリ</span><span class="badge badge-${t.category==='work'?'work':'personal'}">${t.category==='work'?'仕事':'個人'}</span></div>
    <div class="detail-row"><span class="detail-label">優先度</span><span class="badge badge-${t.priority}">${PRIORITY_LABEL[t.priority]}</span></div>
    <div class="detail-row"><span class="detail-label">規模</span><span class="badge ${scaleCls}">${SCALE_LABEL[t.scale]}</span></div>
    ${t.theme?`<div class="detail-row"><span class="detail-label">テーマ</span><span class="badge badge-theme">${h(t.theme)}</span></div>`:''}
    ${t.dueDate?`<div class="detail-row"><span class="detail-label">期日</span>${t.dueDate}</div>`:''}
    ${t.scheduledDate?`<div class="detail-row"><span class="detail-label">作業予定</span>${t.scheduledDate}</div>`:''}
    ${project?`<div class="detail-row"><span class="detail-label">プロジェクト</span><span class="badge" style="background:#f0fdf4;color:#15803d">📁 ${h(project.title)}</span></div>`:''}
    ${goal?`<div class="detail-row"><span class="detail-label">紐づき目標</span><span class="badge badge-goal">🎯#${goal.number} ${h(goal.title)}</span></div>`:''}
    ${t.recurrence?`<div class="detail-row"><span class="detail-label">繰り返し</span><span class="badge badge-recur">🔁${recurLabel(t)}${t.recurrenceEnd?' （〜'+t.recurrenceEnd+'）':''}</span></div>`:''}
    ${t.memo?`<div class="detail-row"><span class="detail-label">メモ</span><span style="font-size:12px;line-height:1.6;white-space:pre-wrap">${h(t.memo)}</span></div>`:''}
    ${(()=>{
      if (!t.recurrence) {
        return `<div class="detail-row"><span class="detail-label">状態</span>${t.completed?'<span style="color:var(--personal);font-weight:600">✓ 完了</span>':'<span style="color:var(--text-muted)">未完了</span>'}</div>`;
      }
      const allDates = getOccurrenceDates(t);
      const doneCnt  = allDates.filter(d => isRecurringDone(t.id, d)).length;
      const pct      = allDates.length ? Math.round(doneCnt / allDates.length * 100) : 0;
      const fullyDone = doneCnt === allDates.length && allDates.length > 0;
      const DAY = ['日','月','火','水','木','金','土'];
      const rows = allDates.map(ds => {
        const done = isRecurringDone(t.id, ds);
        const dn   = DAY[new Date(ds+'T12:00:00').getDay()];
        return `<div class="recur-date-row ${done?'recur-done-row':''}"
                     onclick="toggleCompletion('${t.id}','${ds}');openTaskDetail('${t.id}')">
          <span class="recur-chk">${done?'☑':'☐'}</span>
          <span class="recur-date-label">${ds}（${dn}）</span>
        </div>`;
      }).join('');
      return `
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-weight:600;font-size:13px">完了状況</span>
            <span style="font-size:12px;color:${fullyDone?'var(--goal-done)':'var(--text-muted)'}">
              ${fullyDone?'✓ すべて完了':doneCnt+'/'+allDates.length+' 完了'}
            </span>
          </div>
          <div class="progress-bar" style="margin-bottom:8px">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="recur-date-list">${rows}</div>
        </div>`;
    })()}
  `;

  const btn = document.getElementById('td-complete-btn');
  btn.style.display = '';
  if (t.recurrence) {
    btn.textContent = t.completed ? '未完了に戻す' : '完了にする';
    btn.onclick = () => { toggleComplete(id); closeAllModals(); renderAll(); };
  } else {
    btn.textContent = t.completed ? '未完了に戻す' : '完了にする';
    btn.onclick = () => { toggleComplete(id); closeAllModals(); renderAll(); };
  }
  document.getElementById('td-edit-btn').onclick = () => { closeAllModals(); openEditModal(id); };
  document.getElementById('modal-task-detail').classList.add('open');
}

function openEditModal(id) {
  const t = S.tasks.find(t=>t.id===id);
  if (!t) return;
  document.getElementById('edit-task-form-id') && (document.getElementById('edit-task-form-id').value = id);
  // store id in a hidden field — we'll use a closure instead
  document.getElementById('edit-title').value    = t.title;
  document.getElementById('edit-due-date').value = t.dueDate || '';
  document.getElementById('edit-category').value = t.category;
  document.getElementById('edit-priority').value = t.priority;
  document.getElementById('edit-scale').value    = t.scale;
  buildThemeSelect('edit-theme', t.category, t.theme || '');
  document.getElementById('edit-theme-group').style.display = t.category==='work' ? '' : 'none';
  buildGoalSelect('edit-goal', t.goalId || '');
  buildProjectSelect('edit-project', t.projectId || '');
  document.getElementById('edit-project-group').style.display = t.category==='work' ? '' : 'none';
  document.getElementById('edit-recur').value = t.recurrence || '';
  document.getElementById('edit-recur-end').value = t.recurrenceEnd || '';
  toggleRecurEnd('edit');
  document.getElementById('edit-memo').value = t.memo || '';

  // Store which task we're editing
  document.getElementById('modal-task-edit').dataset.editId = id;
  renderEditSubtasks(id);
  document.getElementById('modal-task-edit').classList.add('open');
}

function renderEditSubtasks(parentId) {
  const children = S.tasks.filter(c => c.parentId === parentId);
  const section  = document.getElementById('edit-subtask-section');
  if (!children.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  document.getElementById('edit-subtask-list').innerHTML = children.map(c => {
    const done = isTaskDone(c);
    return `
    <div class="block-task-row" style="padding:7px 2px;border-bottom:1px solid var(--border)">
      <input type="checkbox" ${done ? 'checked' : ''}
        onchange="toggleComplete('${c.id}');renderEditSubtasks('${parentId}');renderAll()">
      <span style="flex:1;font-size:13px;${done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">${h(c.title)}</span>
      <button class="btn btn-sm" title="作業予定を登録" onclick="openScheduleModal('${c.id}')">📅</button>
    </div>`;
  }).join('');
}

function saveEditTask() {
  const id = document.getElementById('modal-task-edit').dataset.editId;
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { showToast('タスク名を入力してください'); return; }
  const cat = document.getElementById('edit-category').value;
  updateTask(id, {
    title,
    dueDate:   document.getElementById('edit-due-date').value || null,
    category:  cat,
    priority:  document.getElementById('edit-priority').value,
    scale:     document.getElementById('edit-scale').value,
    theme:         cat==='work' ? (document.getElementById('edit-theme').value || null) : null,
    goalId:        document.getElementById('edit-goal').value || null,
    projectId:     cat==='work' ? (document.getElementById('edit-project').value || null) : null,
    recurrence:    document.getElementById('edit-recur').value || null,
    recurrenceEnd: document.getElementById('edit-recur-end').value || null,
    memo:          document.getElementById('edit-memo').value.trim() || null,
  });
  closeAllModals();
  renderAll();
  showToast('更新しました');
}

// ──────────────────────────────────────────────
//  MODALS: SCHEDULE
// ──────────────────────────────────────────────
function openScheduleModal(id) {
  _schedTaskId = id;
  const t = S.tasks.find(t=>t.id===id);
  document.getElementById('sched-date').value = t.scheduledDate || today();
  document.getElementById('sched-task-group').style.display = 'none';
  document.getElementById('modal-schedule').classList.add('open');
}

function toggleRecurEnd(prefix) {
  const val = document.getElementById(`${prefix}-recur`).value;
  document.getElementById(`${prefix}-recur-end-group`).style.display = val ? '' : 'none';
}
function toggleBlockRecurEnd() {
  const val = document.getElementById('bm-recur').value;
  document.getElementById('bm-recur-end-group').style.display = val ? '' : 'none';
}

function saveSchedule() {
  const id = _schedTaskId || document.getElementById('sched-task-select').value;
  if (!id) { showToast('タスクを選択してください'); return; }
  updateTask(id, {
    scheduledDate: document.getElementById('sched-date').value || null,
  });
  closeAllModals();
  renderAll();
  showToast('スケジュールを登録しました');
}

function clearSchedule() {
  const id = _schedTaskId || document.getElementById('sched-task-select').value;
  if (!id) return;
  updateTask(id, { scheduledDate: null });
  closeAllModals();
  renderAll();
  showToast('スケジュールを解除しました');
}

// ──────────────────────────────────────────────
//  MODALS: BLOCK
// ──────────────────────────────────────────────
function openBlockModal(id, prefillDate, prefillStart, prefillEnd) {
  _blockEditId = id || null;
  _blockPendingTaskId = null;
  const b = id ? getBlockById(id) : null;

  document.getElementById('block-modal-title').innerHTML = b
    ? `作業枠を編集${b.recurrence ? ` <span class="badge badge-recur" style="font-size:11px">🔁${recurLabel({recurrence:b.recurrence})}</span>` : ''}`
    : '作業枠を追加';
  document.getElementById('block-save-btn').style.display   = '';   // 必ず表示
  document.getElementById('block-delete-btn').style.display = b ? '' : 'none';

  // 繰り返しブロック対応:
  // editDate       → 日付入力欄に表示する値。既存ブロックは b.date（基準日）を維持して recurrence チェーンを守る
  // _blockViewDate → 繰り返しタスクの完了ログ日付。カレンダーから開いた日付 (prefillDate) を優先する
  const editDate = b ? b.date : (prefillDate || today());
  _blockViewDate = b ? (prefillDate || b.date) : (prefillDate || today());
  const start = b ? b.startTime : (prefillStart || '09:00');
  const end   = b ? b.endTime   : (prefillEnd   || '10:00');
  const title = b ? b.title     : '';
  const theme = b ? (b.theme || '') : '';
  const bTasks  = b ? getBlockTasks(b.id) : [];
  const doneCnt = bTasks.filter(t => t.recurrence ? isRecurringDone(t.id, _blockViewDate) : t.completed).length;

  // この枠にまだ紐づいていない未完了タスク
  const unlinked = b ? S.tasks.filter(t => !t.completed && !(t.blockIds||[]).includes(b.id)) : [];

  document.getElementById('block-modal-body').innerHTML = `
    ${!b && S.blockTemplates.length ? `
    <div class="form-group mb8">
      <label>📋 テンプレートから選ぶ <span style="font-size:11px;color:var(--text-muted)">(任意)</span></label>
      <select id="bm-template" onchange="applyBlockTemplate(this.value)"
        style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;background:var(--surface)">
        <option value="">— テンプレートを選ぶ —</option>
        ${S.blockTemplates.map(t=>`<option value="${t.id}">${h(t.title||'無題')} ${t.startTime}〜${t.endTime}${t.theme?' ['+h(t.theme)+']':''}</option>`).join('')}
      </select>
    </div>` : ''}
    <div class="form-group mb8">
      <label>タイトル <span style="font-size:11px;color:var(--text-muted)">(任意)</span></label>
      <input type="text" id="bm-title" value="${h(title)}" placeholder="例: 午前の作業・MTG準備">
    </div>
    <div class="form-group mb8">
      <label>テーマ <span style="font-size:11px;color:var(--text-muted)">(任意・ICS の CATEGORIES に出力)</span></label>
      <input type="text" id="bm-theme" value="${h(theme)}" placeholder="例: 設備計画・導入・活用">
    </div>
    <div class="form-row">
      <div class="form-group mb8">
        <label>日付</label>
        <input type="date" id="bm-date" value="${editDate}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group mb8">
        <label>繰り返し</label>
        <select id="bm-recur" onchange="toggleBlockRecurEnd()"
          style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;background:var(--surface)">
          <option value="" ${!b?.recurrence?'selected':''}>なし</option>
          <option value="daily" ${b?.recurrence==='daily'?'selected':''}>毎日</option>
          <option value="weekday" ${b?.recurrence==='weekday'?'selected':''}>毎日(平日)</option>
          <option value="weekly" ${b?.recurrence==='weekly'?'selected':''}>毎週</option>
        </select>
      </div>
      <div class="form-group mb8" id="bm-recur-end-group" style="display:${b?.recurrence?'':'none'}">
        <label>終了日</label>
        <input type="date" id="bm-recur-end" value="${b?.recurrenceEnd||''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group mb8">
        <label>開始</label>
        <input type="time" id="bm-start" value="${start}">
      </div>
      <div class="form-group mb8">
        <label>終了</label>
        <input type="time" id="bm-end" value="${end}">
      </div>
    </div>
    ${b ? `
    <div class="block-section-title">紐づきタスク (${doneCnt}/${bTasks.length} 完了)</div>
    <div id="bm-linked">
      ${bTasks.length ? bTasks.map(t => {
          // 繰り返しタスク：_blockViewDate の日別ログで判定
          // 通常タスク    ：t.completed で判定
          const chkd = t.recurrence ? isRecurringDone(t.id, _blockViewDate) : t.completed;
          const onchg = t.recurrence
            ? `toggleCompletion('${t.id}',_blockViewDate);renderAll();openBlockModal('${b.id}',_blockViewDate)`
            : `toggleComplete('${t.id}');renderAll();openBlockModal('${b.id}',_blockViewDate)`;
          return `
        <div class="block-task-row">
          <input type="checkbox" ${chkd?'checked':''}
            onchange="${onchg}">
          <span style="flex:1;font-size:12px;${chkd?'text-decoration:line-through;color:var(--text-muted)':''}">${h(t.title)}</span>
          <button class="btn btn-sm btn-danger" style="padding:1px 6px;font-size:11px"
            onclick="unlinkTaskFromBlock('${t.id}','${b.id}');renderAll();openBlockModal('${b.id}',_blockViewDate)">外す</button>
        </div>`;
        }).join('') : '<div style="color:var(--text-muted);font-size:12px">タスクが紐づいていません</div>'}
    </div>
    <div class="block-section-title">タスクを追加</div>
    <div>
      ${unlinked.length ? `
        <select id="bm-add-task" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit;margin-bottom:6px">
          <option value="">— タスクを選択 —</option>
          ${unlinked.map(t=>`<option value="${t.id}">${h(t.title)}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="addTaskToBlock('${b.id}')">追加</button>
      ` : '<div style="color:var(--text-muted);font-size:12px">リンク可能なタスクがありません</div>'}
    </div>` : ''}
  `;

  document.getElementById('modal-block').classList.add('open');
}

function addTaskToBlock(blockId) {
  const sel = document.getElementById('bm-add-task');
  if (!sel || !sel.value) { showToast('タスクを選択してください'); return; }
  linkTaskToBlock(sel.value, blockId);
  renderAll();
  openBlockModal(blockId, _blockViewDate); // _blockViewDate を引き継ぐ
}

function saveBlock() {
  const date  = document.getElementById('bm-date').value;
  const start = document.getElementById('bm-start').value;
  const end   = document.getElementById('bm-end').value;
  if (!date)  { showToast('日付を入力してください'); return; }
  if (!start) { showToast('開始時刻を入力してください'); return; }
  if (!end)   { showToast('終了時刻を入力してください'); return; }
  if (end <= start) { showToast('終了時刻は開始時刻より後にしてください'); return; }
  const title         = document.getElementById('bm-title').value.trim();
  const theme         = document.getElementById('bm-theme').value.trim();
  const recurrence    = document.getElementById('bm-recur').value || null;
  const recurrenceEnd = document.getElementById('bm-recur-end').value || null;
  if (_blockEditId) {
    updateBlock(_blockEditId, { title, theme, date, startTime: start, endTime: end, recurrence, recurrenceEnd });
    showToast('作業枠を更新しました');
  } else {
    const newId = addBlock({ title, theme, date, startTime: start, endTime: end, recurrence, recurrenceEnd });
    if (_blockPendingTaskId) { linkTaskToBlock(_blockPendingTaskId, newId); }
    showToast('作業枠を追加しました');
  }
  closeAllModals();
  renderAll();
}

function confirmDeleteBlock() {
  if (!_blockEditId) return;
  if (confirm('この作業枠を削除しますか？（紐づくタスクのリンクも解除されます）')) {
    deleteBlock(_blockEditId);
    closeAllModals();
    renderAll();
    showToast('作業枠を削除しました');
  }
}

// タスク一覧の📦ボタン → ブロックマルチリンク選択
function openBlockLink(taskId) {
  _blockPendingTaskId = taskId;
  const t = S.tasks.find(t => t.id === taskId);

  document.getElementById('block-modal-title').textContent = '作業枠にリンク';
  document.getElementById('block-delete-btn').style.display = 'none';
  document.getElementById('block-save-btn').style.display = 'none';
  _blockEditId = null;

  // scheduledDate未設定なら今日をデフォルト基準日に
  const filterDate = t?.scheduledDate || today();

  document.getElementById('block-modal-body').innerHTML = `
    <div style="font-size:13px;margin-bottom:8px">
      <strong>${h(t ? t.title : '')}</strong>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button id="blf-all" class="btn btn-sm" onclick="renderBlockLinkList('${taskId}',null)" style="font-size:11px">すべて</button>
      <button id="blf-date" class="btn btn-sm active" onclick="renderBlockLinkList('${taskId}','${filterDate}')" style="font-size:11px">📅 ${filterDate} のみ</button>
    </div>
    <div id="block-link-list" style="max-height:240px;overflow-y:auto"></div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="openNewBlockForTask('${taskId}')">＋ 新しい作業枠を作成</button>
      <button class="btn btn-sm" onclick="closeAllModals();renderAll()">閉じる</button>
    </div>
  `;

  // デフォルトで日付フィルターON（0件なら自動でall表示）
  renderBlockLinkList(taskId, filterDate);
  document.getElementById('modal-block').classList.add('open');
}

function renderBlockLinkList(taskId, filterDate) {
  const t = S.tasks.find(t => t.id === taskId);
  const linkedIds = t ? (t.blockIds || []) : [];

  // フィルターボタンの active 状態を切り替え
  const btnAll  = document.getElementById('blf-all');
  const btnDate = document.getElementById('blf-date');
  if (btnAll)  btnAll.classList.toggle('active',  !filterDate);
  if (btnDate) btnDate.classList.toggle('active', !!filterDate);

  // 絞り込み（繰り返し作業枠も isBlockOnDate で判定）
  let blocks = [...S.blocks].sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
  if (filterDate) {
    const filtered = blocks.filter(b => isBlockOnDate(b, filterDate));
    // 0件なら自動で「すべて」にフォールバック
    if (filtered.length === 0) {
      if (btnAll)  btnAll.classList.add('active');
      if (btnDate) btnDate.classList.remove('active');
      // フォールバックメッセージを先頭に追加
      document.getElementById('block-link-list').innerHTML =
        `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;padding:4px 2px">📅 ${filterDate} の作業枠がないため全件表示しています</div>`;
      // blocksはそのまま（全件）
    } else {
      blocks = filtered;
      document.getElementById('block-link-list').innerHTML = '';
    }
  } else {
    document.getElementById('block-link-list').innerHTML = '';
  }

  document.getElementById('block-link-list').innerHTML +=
    blocks.map(b => {
      const bTasks   = getBlockTasks(b.id);
      const isLinked = linkedIds.includes(b.id);
      const recurBadge = b.recurrence ? `<span style="font-size:10px;color:var(--primary);margin-left:4px">🔁</span>` : '';
      return `<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid ${isLinked?'var(--primary)':'var(--border)'};
        border-radius:6px;margin-bottom:6px;cursor:pointer;background:${isLinked?'#eff6ff':'var(--surface)'};
        transition:background .15s">
        <input type="checkbox" ${isLinked?'checked':''} style="width:15px;height:15px;accent-color:var(--primary)"
          onchange="toggleBlockLink('${taskId}','${b.id}',this.checked)">
        <div style="flex:1">
          <div style="font-weight:700;font-size:12px">${h(b.title||'作業枠')}${recurBadge}</div>
          <div style="font-size:11px;color:var(--text-muted)">${b.date} ${b.startTime}–${b.endTime}　タスク${bTasks.length}件</div>
        </div>
      </label>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">作業枠がありません</div>';
}

// チェックボックス変更でリンク/アンリンク（モーダルを閉じない）
function toggleBlockLink(taskId, blockId, checked) {
  if (checked) {
    linkTaskToBlock(taskId, blockId);
    showToast('作業枠にリンクしました');
  } else {
    unlinkTaskFromBlock(taskId, blockId);
    showToast('リンクを解除しました');
  }
  renderAll();
  // 現在のフィルター状態を保ったままリスト再描画
  const btnDate = document.getElementById('blf-date');
  const t = S.tasks.find(t => t.id === taskId);
  // ボタンのテキストから日付を取得（scheduledDate未設定時はtoday()がセットされている）
  const currentFilter = btnDate?.classList.contains('active')
    ? (t?.scheduledDate || today())
    : null;
  renderBlockLinkList(taskId, currentFilter);
}

function openNewBlockForTask(taskId) {
  _blockPendingTaskId = taskId;
  _blockEditId = null;
  document.getElementById('block-save-btn').style.display = '';
  openBlockModal(null, today(), '09:00', '10:00');
  // Restore pending task id after openBlockModal resets it
  _blockPendingTaskId = taskId;
}

// ──────────────────────────────────────────────
//  MODALS: GOAL
// ──────────────────────────────────────────────
function openGoalDetail(id) {
  const g = S.goals.find(g=>g.id===id);
  if (!g) return;
  document.getElementById('goal-detail-title').textContent = `#${g.number} 目標詳細`;

  const linked  = S.tasks.filter(t => t.goalId === id);
  const tod     = today();

  // 繰り返しタスクは「1回以上完了」で done 扱い、通常タスクは completed フラグで判定
  const doneLinked = linked.filter(t =>
    t.recurrence
      ? S.completions.some(c => c.taskId === t.id)
      : isTaskDone(t)
  );
  const pct = linked.length ? Math.round(doneLinked.length / linked.length * 100) : 0;

  // 繰り返しタスクの表示用データを事前計算
  const recurStats = {};
  linked.filter(t => t.recurrence).forEach(t => {
    const totalOcc  = getOccurrenceDates(t).length;
    const doneCount = S.completions.filter(c => c.taskId === t.id).length;
    const todayDone = isRecurringDone(t.id, tod);
    recurStats[t.id] = { totalOcc, doneCount, todayDone };
  });

  document.getElementById('goal-detail-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">番号</span>
      <input id="gd-number" type="number" min="1" max="100" value="${g.number}"
        style="width:70px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit">
    </div>
    <div class="detail-row"><span class="detail-label">目標名</span>
      <input id="gd-title" type="text" value="${h(g.title)}"
        style="flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit">
    </div>
    <div class="detail-row"><span class="detail-label">カテゴリ</span>
      <select id="gd-cat" style="padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit">
        <option value="仕事" ${g.category==='仕事'?'selected':''}>仕事</option>
        <option value="個人" ${g.category==='個人'?'selected':''}>個人</option>
        <option value="その他" ${g.category==='その他'?'selected':''}>その他</option>
      </select>
    </div>

async function decomposeTask() {
  const title    = document.getElementById('edit-title').value.trim();
  const category = document.getElementById('edit-category').value;
  const theme    = document.getElementById('edit-theme').value || '';
  const dueDate  = document.getElementById('edit-due-date').value || '';

  if (!title) { showToast('タスク名を入力してください'); return; }

  const apiKey = localStorage.getItem('todo_gemini_api_key') || '';
  if (!apiKey) {
    showToast('設定から Gemini API キーを登録してください');
    closeAllModals();
    openSettings();
    return;
  }
  const model = localStorage.getItem('todo_gemini_model') || 'gemini-2.0-flash';

  document.getElementById('ai-tasks-body').innerHTML =
    '<div class="travel-generating" style="padding:24px 0">🤖 サブタスクを生成中…</div>';
  document.getElementById('ai-tasks-add-btn').onclick = null;
  closeAllModals();
  document.getElementById('modal-ai-tasks').classList.add('open');

  const themeList = (S.themes[category] || []).join('、');
  const catLabel  = category === 'work' ? '仕事' : '個人';
  const prompt = `あなたはタスク管理の専門家です。以下のタスクを達成するための具体的なサブタスクを5〜10件提案してください。

タスク名: ${title}
カテゴリ: ${catLabel}
テーマ: ${theme || 'なし'}
期日: ${dueDate || 'なし'}
${themeList ? `利用可能なテーマ: ${themeList}` : ''}

必ず以下のJSON形式のみで回答してください（説明文は一切不要）:
{
  "tasks": [
    {
      "title": "サブタスク名（30文字以内）",
      "priority": "high | medium | low",
      "scale": "large | medium | small",
      "theme": "テーマ名または空文字",
      "memo": "補足（30文字以内、任意）"
    }
  ]
}
priority: high=今すぐ必要, medium=通常, low=余裕があれば
scale: large=2時間以上, medium=1〜2時間, small=1時間未満
theme は利用可能なテーマから選ぶか空文字。`;

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const res  = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 4096 },
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw     = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    let jsonStr   = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const objStart = jsonStr.indexOf('{');
    if (objStart !== -1) {
      const lastComma = jsonStr.lastIndexOf('},');
      if (lastComma !== -1 && !jsonStr.trimEnd().endsWith(']}')) {
        jsonStr = jsonStr.slice(0, lastComma + 1) + ']}';
      }
    }
    const parsed  = JSON.parse(jsonStr);
    const aiTasks = parsed.tasks || [];
    if (!aiTasks.length) throw new Error('提案タスクが0件でした');

    renderAiTaskSuggestions(aiTasks, null);
    document.getElementById('ai-tasks-add-btn').onclick =
      () => addSelectedAiTasksFromEdit(aiTasks, category, theme || null);

  } catch (e) {
    document.getElementById('ai-tasks-body').innerHTML = `
      <div style="padding:16px">
        <div style="color:var(--high);margin-bottom:12px">❌ ${h(e.message)}</div>
        <button class="btn btn-sm btn-primary" onclick="decomposeTask()">🔄 再試行</button>
      </div>`;
  }
}

function buildDecomposePrompt(goal) {
  const base = `目標：${goal.title}\nカテゴリ：${goal.category}\n`;

  if (goal.type === 'achievement') {
    return base + `この目標を達成するために必要なタスクをすべて洗い出してください。
具体的なアクションに分解し、5〜10件提案してください。`;

  } else if (goal.type === 'habit') {
    return base + `この習慣を継続するために、1ヶ月単位の繰り返しタスクを12ヶ月分提案してください。
各タスクは「${goal.title}（1月）」のような形式で月ごとに1件ずつ、合計12件作成してください。
各タスクのJSONには必ず以下のフィールドをすべて含めてください：
- recurrence: "daily"（毎日習慣の場合）または "weekly"（週次習慣の場合）
- scheduledDate: その月の1日（例："2026-01-01"）
- recurrenceEnd: その月の末日（例："2026-01-31"）
例：
{
  "title": "${goal.title}（1月）",
  "recurrence": "daily",
  "scheduledDate": "2026-01-01",
  "recurrenceEnd": "2026-01-31",
  "priority": "medium",
  "scale": "small"
}`;

  } else if (goal.type === 'explore') {
    return base + `現在の状況：${goal.progressNote || '未記入'}
この目標に向けて、今すぐ取り組める具体的な次のアクションを5〜10件提案してください。
現在の状況を踏まえて、現実的なタスクを提案してください。`;

  } else {
    return base + `この目標を達成するために必要なタスクを5〜10件提案してください。`;
  }
}

function toggleAiSelectAll(checked) {
  document.querySelectorAll('input[name=ai-task-cb]').forEach(cb => cb.checked = checked);
}

function addSelectedAiTasks(tasks, goalId) {
  const g       = S.goals.find(g => g.id === goalId);
  const indices = [...document.querySelectorAll('input[name=ai-task-cb]:checked')].map(cb => parseInt(cb.value));
  if (!indices.length) { showToast('タスクを1件以上選択してください'); return; }

  const category = g?.category === '仕事' ? 'work' : 'personal';
  indices.forEach(i => {
    const t = tasks[i];
    if (!t) return;
    addTask({
      title:          t.title,
      category,
      priority:       ['high','medium','low'].includes(t.priority) ? t.priority : 'medium',
      scale:          ['large','medium','small'].includes(t.scale)  ? t.scale  : 'medium',
      theme:          t.theme || null,
      recurrence:     ['daily','weekday','weekly'].includes(t.recurrence) ? t.recurrence : null,
      scheduledDate:  t.scheduledDate || null,
      recurrenceEnd:  t.recurrenceEnd || null,
      memo:           t.memo || null,
      goalId,
    });
  });

  closeAllModals();
  showPage('todo');
  renderAll();
  showToast(`✅ ${indices.length}件のタスクをTODOに追加しました`);
}

function addSelectedAiTasksFromEdit(tasks, category, theme) {
  const indices  = [...document.querySelectorAll('input[name=ai-task-cb]:checked')].map(cb => parseInt(cb.value));
  if (!indices.length) { showToast('タスクを1件以上選択してください'); return; }

  const parentId = document.getElementById('modal-task-edit').dataset.editId || null;
  indices.forEach(i => {
    const t = tasks[i];
    if (!t) return;
    addTask({
      title:    t.title,
      category,
      priority: ['high','medium','low'].includes(t.priority) ? t.priority : 'medium',
      scale:    ['large','medium','small'].includes(t.scale)  ? t.scale  : 'medium',
      theme:    t.theme || theme || null,
      memo:     t.memo || null,
      parentId,
    });
  });

  closeAllModals();
  showPage('todo');
  renderAll();
  showToast(`✅ ${indices.length}件のサブタスクをTODOに追加しました`);
}

function buildSuggestPrompt(goals) {
  const today = new Date();
  const month = today.getMonth() + 1;
  const notStarted = goals
    .filter(g => g.status === 'notStarted')
    .map(g => `- [${g.number}] ${h(g.title)}（${g.type || '未設定'}）状況：${g.progressNote || 'なし'}`)
    .join('\n');
  const planningList = goals
    .filter(g => g.status === 'planning')
    .map(g => `- [${g.number}] ${h(g.title)}（${g.type || '未設定'}）状況：${g.progressNote || 'なし'}`)
    .join('\n');
  const inProgress = goals
    .filter(g => g.status === 'inProgress')
    .map(g => `- [${g.number}] ${h(g.title)}（${g.type || '未設定'}）状況：${g.progressNote || 'なし'}`)
    .join('\n');

  return `今月（${month}月）のやること100リストです。
プライベート・自己成長系の目標の中から、
今月小さく始められそうなものを3〜5件選んでください。

優先順位ではなく「今の季節・状況で動きやすいか」「次のアクションが明確か」で選んでください。
未着手・計画中の目標を優先し、進行中の目標は補足的に選んでください。

【未着手の目標】（優先して選んでください）
${notStarted || '（なし）'}

【計画中の目標】（優先して選んでください）
${planningList || '（なし）'}

【進行中の目標】（必要なら選んでも構いません）
${inProgress || '（なし）'}

JSON形式で返してください：
[{
  "number": 1,
  "reason": "選んだ理由を1〜2文で"
}]`;
}

async function suggestGoals() {
  const apiKey = localStorage.getItem('todo_gemini_api_key') || '';
  if (!apiKey) { alert('設定からGemini APIキーを入力してください'); return; }

  const btn = document.getElementById('goal-suggest-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 提案中…';

  document.getElementById('goal-suggest-body').innerHTML =
    '<div class="travel-generating" style="padding:24px 0;text-align:center">🤖 AIが分析中…</div>';
  document.getElementById('modal-goal-suggest').classList.add('open');

  try {
    const model    = localStorage.getItem('todo_gemini_model') || 'gemini-2.0-flash';
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const prompt   = buildSuggestPrompt(S.goals);

    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7 } }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text  = data.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.length) throw new Error('提案が0件でした');

    const goalMap = new Map(S.goals.map(g => [g.number, g]));
    const statusLabel = { notStarted: '未着手', planning: '計画中', inProgress: '進行中', done: '達成' };
    const statusStyle = { notStarted: 'background:#f1f5f9;color:#64748b', planning: 'background:#e0f2fe;color:#0369a1', inProgress: 'background:#fef9c3;color:#92400e', done: 'background:#d1fae5;color:#065f46' };
    const typeBadgeLabel = { achievement: '達成型', habit: '習慣型', explore: '探索型' };
    const typeBadgeStyle = { achievement: 'background:#dbeafe;color:#1d4ed8', habit: 'background:#d1fae5;color:#065f46', explore: 'background:#fed7aa;color:#9a3412' };
    let html = '';
    parsed.forEach((item, idx) => {
      const g = goalMap.get(item.number);
      if (!g) return;
      const st = g.status || 'notStarted';
      const statusBadge = `<span style="font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;${statusStyle[st]||''}">${statusLabel[st]||st}</span>`;
      const typeBadge   = g.type ? `<span style="font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;${typeBadgeStyle[g.type]||''}">${typeBadgeLabel[g.type]||''}</span>` : '';
      html += `
        <div style="margin-bottom:14px;padding-bottom:14px;${idx < parsed.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap">
            ${statusBadge}${typeBadge}
            <span style="font-size:11px;color:var(--text-muted)">#${g.number}</span>
          </div>
          <div style="font-weight:600;font-size:13px;margin-bottom:4px">${h(g.title)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">→ ${h(item.reason)}</div>
          <button class="btn btn-sm btn-primary" onclick="closeAllModals();decomposeGoal('${g.id}')">🤖 AI分解する</button>
        </div>`;
    });
    document.getElementById('goal-suggest-body').innerHTML = html || '<div style="padding:16px;color:var(--text-muted)">該当するGoalが見つかりませんでした</div>';

  } catch (e) {
    document.getElementById('goal-suggest-body').innerHTML =
      `<div style="padding:16px;color:var(--high)">❌ ${h(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 今月動けそうなGoalを提案';
  }
}

async function decomposeProject(projectId) {
  const p = getProjectById(projectId);
  if (!p) return;

  const apiKey = localStorage.getItem('todo_gemini_api_key') || '';
  if (!apiKey) { alert('設定からGemini APIキーを入力してください'); return; }

  document.getElementById('ai-tasks-body').innerHTML =
    '<div class="travel-generating" style="padding:24px 0;text-align:center">🤖 タスクを生成中…</div>';
  document.getElementById('ai-tasks-add-btn').onclick = null;
  closeAllModals();
  document.getElementById('modal-ai-tasks').classList.add('open');

  const prompt = `仕事のプロジェクトを完了するために必要なタスクを洗い出してください。

プロジェクト名：${p.title}
テーマ：${p.theme || 'なし'}
期日：${p.dueDate || '未設定'}
優先度：${PRIORITY_LABEL[p.priority] || p.priority}
メモ・背景：${p.memo || 'なし'}

以下の条件でタスクを5〜10件提案してください：
- 期日から逆算して順序を考慮すること
- 優先度・規模も設定すること
- 仕事のタスクとして具体的なアクションにすること

JSON形式で返してください（説明文は不要）：
[{"title":"タスク名","priority":"high|medium|low","scale":"large|medium|small"}]`;

  try {
    const model    = localStorage.getItem('todo_gemini_model') || 'gemini-2.0-flash';
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7 } }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text  = data.candidates[0].content.parts[0].text;
    let clean   = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    // 配列の開始を探す
    const arrStart = clean.indexOf('[');
    if (arrStart > 0) clean = clean.slice(arrStart);
    const aiTasks = JSON.parse(clean);
    if (!aiTasks.length) throw new Error('提案が0件でした');
    renderAiTaskSuggestions(aiTasks, null);
    document.getElementById('ai-tasks-add-btn').onclick = () => addSelectedAiTasksForProject(aiTasks, p);
  } catch (e) {
    document.getElementById('ai-tasks-body').innerHTML =
      `<div style="padding:16px"><div style="color:var(--high);margin-bottom:12px">❌ ${h(e.message)}</div>
       <button class="btn btn-sm btn-primary" onclick="closeAllModals();decomposeProject('${projectId}')">🔄 再試行</button></div>`;
  }
}

function addSelectedAiTasksForProject(tasks, project) {
  const indices = [...document.querySelectorAll('input[name=ai-task-cb]:checked')].map(cb => parseInt(cb.value));
  if (!indices.length) { showToast('タスクを1件以上選択してください'); return; }
  indices.forEach(i => {
    const t = tasks[i];
    if (!t) return;
    addTask({
      title:     t.title,
      category:  'work',
      priority:  ['high','medium','low'].includes(t.priority) ? t.priority : 'medium',
      scale:     ['large','medium','small'].includes(t.scale)  ? t.scale   : 'medium',
      theme:     project.theme || null,
      projectId: project.id,
    });
  });
  closeAllModals();
  showPage('todo');
  renderAll();
  showToast(`✅ ${indices.length}件のタスクをTODOに追加しました`);
}

function saveGistToken() {
  const token = document.getElementById('gist-token-input').value.trim();
  const id    = document.getElementById('gist-id-input').value.trim();
  if (!token) { showToast('トークンを入力してください'); return; }
  localStorage.setItem('todo_gist_token', token);
  if (id) localStorage.setItem('todo_gist_id', id);
  showToast('設定を保存しました');
  renderSettings();
}

// トークンを使ってGist一覧から todo_app_data.json を探してIDを自動取得
async function gistFindId() {
  const token = document.getElementById('gist-token-input').value.trim()
    || localStorage.getItem('todo_gist_token');
  if (!token) { showToast('先にトークンを入力してください'); return; }
  try {
    showToast('検索中...');
    const res = await fetch('https://api.github.com/gists?per_page=100', {
      headers: { Authorization: `token ${token}` },
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const list = await res.json();
    const found = list.find(g => g.files && g.files['todo_app_data.json']);
    if (!found) { showToast('Gistが見つかりません。先にPCで「保存」してください'); return; }
    localStorage.setItem('todo_gist_id', found.id);
    document.getElementById('gist-id-input').value = found.id;
    showToast('✅ Gist IDを取得しました');
    renderSettings();
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

let _reviewDate     = null;  // 開いている振り返りの日付
let _reviewItems    = [];    // UI上のアイテム配列
let _reviewAiAdvice = null;  // AIアドバイス文字列

function openReviewModal(ds) {
  _reviewDate     = ds;
  _reviewItems    = [];
  _reviewAiAdvice = null;

  document.getElementById('review-modal-title').textContent = `📝 ${ds} の振り返り`;

  // ① 通常タスク（期日がその日）
  const dueTasks = S.tasks.filter(t => t.dueDate === ds);
  // ② 繰り返しタスク（completionsログに記録あり = その日に実施した事実が確定）
  // isOccurrenceOnDate は不要。ログの存在が唯一の根拠。
  const recurringDone = S.tasks.filter(t =>
    t.recurrence && isRecurringDone(t.id, ds)
  );
  // ③ 繰り返しタスク（その日が発生日 + 未完了）
  const recurringUndone = S.tasks.filter(t =>
    t.recurrence && isOccurrenceOnDate(t, ds) && !isRecurringDone(t.id, ds)
  );

  // 繰り返しタスクID（dueTasks との重複除去用）
  const recurIds = new Set([...recurringDone, ...recurringUndone].map(t => t.id));
  const doneList   = [...dueTasks.filter(t =>  t.completed && !recurIds.has(t.id)), ...recurringDone];
  const undoneList = [...dueTasks.filter(t => !t.completed && !recurIds.has(t.id)), ...recurringUndone];

  const existing = S.reviews.find(r => r.date === ds);
  if (existing?.aiAdvice) _reviewAiAdvice = existing.aiAdvice;

  [...doneList, ...undoneList].forEach(t => {
    const parent  = t.parentId ? S.tasks.find(p => p.id === t.parentId) : null;
    const exItem  = existing?.items?.find(i => i.taskId === t.id);
    const isDone  = t.recurrence ? isRecurringDone(t.id, ds) : t.completed;
    _reviewItems.push({
      taskId:      t.id,
      title:       t.title,
      parentTitle: parent?.title || null,
      recurrence:  t.recurrence  || null,
      completed:   isDone,
      result:      exItem?.result      || null,
      comment:     exItem?.comment     || null,
      commentFree: exItem?.commentFree || null,
    });
  });

  renderReviewModal();
  document.getElementById('modal-review').classList.add('open');
}

function setReviewResult(idx, result) {
  // 同じボタンを押したらトグル解除
  _reviewItems[idx].result  = _reviewItems[idx].result === result ? null : result;
  _reviewItems[idx].comment = null;
  renderReviewModal();
}
function setReviewComment(idx, val) {
  _reviewItems[idx].comment = val || null;
}
function setReviewCommentFree(idx, val) {
  _reviewItems[idx].commentFree = val || null;
}

function buildReviewPrompt(date, items, memo) {
  const doneList = items.filter(i => i.completed)
    .map(i => `・${i.title}（${i.result==='good'?'○':'×'}）${i.comment||''}${i.commentFree?'：'+i.commentFree:''}`)
    .join('\n');
  const undoneList = items.filter(i => !i.completed)
    .map(i => `・${i.title}（${i.result==='bad'?'×':'未評価'}）${i.comment||''}${i.commentFree?'：'+i.commentFree:''}`)
    .join('\n');
  return `
${date}の振り返りに対してアドバイスをください。

【完了タスク】
${doneList || 'なし'}

【未完了タスク】
${undoneList || 'なし'}

【一言メモ】
${memo || 'なし'}

以下の観点で100〜150字程度でアドバイスをください：
・よかった点を簡潔に認める
・未完了タスクへの具体的なアドバイス
・明日への一言
`;
}

async function getReviewAiAdvice() {
  const apiKey = localStorage.getItem('todo_gemini_api_key');
  if (!apiKey) { alert('設定からGemini APIキーを入力してください'); return; }
  const model = localStorage.getItem('todo_gemini_model') || 'gemini-2.0-flash';

  const btn = document.getElementById('review-ai-btn');
  btn.disabled = true;
  btn.textContent = '🤖 生成中…';

  const memo = document.getElementById('review-memo')?.value || '';
  const prompt = buildReviewPrompt(_reviewDate, _reviewItems, memo);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 512 },
        }),
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    _reviewAiAdvice = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    renderReviewModal();
  } catch (e) {
    showToast('AIアドバイスエラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 AIアドバイス';
  }
}

function saveReviewFromModal() {
  const memo = document.getElementById('review-memo')?.value?.trim() || '';
  const existing = S.reviews.findIndex(r => r.date === _reviewDate);
  const review = {
    id:        existing >= 0 ? S.reviews[existing].id : uuid(),
    date:      _reviewDate,
    items:     _reviewItems.map(({ taskId, title, parentTitle, completed, result, comment, commentFree }) =>
                 ({ taskId, title, parentTitle, completed, result, comment, commentFree })),
    memo,
    aiAdvice:  _reviewAiAdvice || null,
    createdAt: existing >= 0 ? S.reviews[existing].createdAt : new Date().toISOString(),
  };
  if (existing >= 0) S.reviews[existing] = review;
  else               S.reviews.unshift(review);
  saveReviews();
  closeAllModals();
  updateReviewBtn(_reviewDate);
  showToast('✅ 振り返りを保存しました');
}

function updateReviewBtn(ds) {
  const btn = document.getElementById('review-btn');
  if (!btn) return;
  const exists = S.reviews.some(r => r.date === ds);
  btn.textContent = exists ? '📝✓' : '📝';
  btn.style.color = exists ? 'var(--goal-done)' : '';
  btn.title = exists ? '振り返り済み（クリックで編集）' : '振り返りを記録';
}

async function gistPush() {
  const token  = localStorage.getItem('todo_gist_token');
  const gistId = localStorage.getItem('todo_gist_id');
  if (!token) { showToast('先にトークンを設定してください'); openSettings(); return; }

  const content = JSON.stringify({
    tasks: S.tasks, goals: S.goals, blocks: S.blocks,
    completions: S.completions, themes: S.themes,
    blockTemplates: S.blockTemplates, projects: S.projects,
    reviews: S.reviews,
  }, null, 2);

  const payload = {
    description: 'TODO App Data',
    public: false,
    files: { 'todo_app_data.json': { content } },
  };

  try {
    showToast('保存中...');
    const res = await fetch(
      gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists',
      {
        method: gistId ? 'PATCH' : 'POST',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }
    );
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const data = await res.json();
    if (!gistId) localStorage.setItem('todo_gist_id', data.id);
    localStorage.setItem('todo_last_saved', new Date().toISOString());
    hideSyncBanner();
    showToast('☁️ クラウドに保存しました');
    renderSettings();
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

async function gistPull() {
  const token  = localStorage.getItem('todo_gist_token');
  const gistId = localStorage.getItem('todo_gist_id');
  if (!token)  { showToast('先にトークンを設定してください'); openSettings(); return; }
  if (!gistId) { showToast('「🔍 検索」ボタンでGist IDを取得してください'); openSettings(); return; }

  try {
    showToast('読込中...');
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}` },
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const data = await res.json();
    const raw  = data.files['todo_app_data.json']?.content;
    if (!raw) throw new Error('ファイルが見つかりません');
    const d = JSON.parse(raw);
    if (!Array.isArray(d.tasks)) throw new Error('データ形式が不正です');
    if (d.tasks)          S.tasks          = d.tasks;
    if (d.goals)          S.goals          = d.goals;
    if (d.blocks)         S.blocks         = d.blocks;
    if (d.completions)    S.completions    = d.completions;
    if (d.themes)         S.themes         = d.themes;
    if (d.blockTemplates) S.blockTemplates = d.blockTemplates;
    if (d.projects)       S.projects       = d.projects;
    if (d.reviews)        S.reviews        = d.reviews;
    saveTasks(); saveGoals(); saveBlocks(); saveCompletions(); saveThemes(); saveBlockTemplates(); saveProjects(); saveReviews();
    localStorage.setItem('todo_last_saved', new Date().toISOString());
    hideSyncBanner();
    renderAll();
    showToast('☁️ クラウドから読み込みました');
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

function exportDayICS() {
  const ds = dateStr(S.calDate);
  const fmtJST = (d, time) => d.replace(/-/g,'') + 'T' + time.replace(':','') + '00';
  const scaleMin = { large: 120, medium: 90, small: 60 };

  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TODO App//JA\r\nCALSCALE:GREGORIAN\r\n';
  ics += 'BEGIN:VTIMEZONE\r\nTZID:Asia/Tokyo\r\nBEGIN:STANDARD\r\n';
  ics += 'TZOFFSETFROM:+0900\r\nTZOFFSETTO:+0900\r\nTZNAME:JST\r\nDTSTART:19700101T000000\r\n';
  ics += 'END:STANDARD\r\nEND:VTIMEZONE\r\n';

  let count = 0;

  // 作業枠 → 1枠 = 1イベント（タスク名をDESCRIPTIONに列挙）
  S.blocks.filter(b => isBlockOnDate(b, ds)).forEach(b => {
    const bTasks = getBlockTasks(b.id);
    const summary = b.title || '作業枠';
    const desc = bTasks.length ? bTasks.map(t => t.title).join('\\n') : '';
    ics += 'BEGIN:VEVENT\r\n';
    ics += `SUMMARY:${summary.replace(/\r?\n/g,'\\n')}\r\n`;
    ics += `DTSTART;TZID=Asia/Tokyo:${fmtJST(ds, b.startTime)}\r\n`;
    ics += `DTEND;TZID=Asia/Tokyo:${fmtJST(ds, b.endTime)}\r\n`;
    if (desc) ics += `DESCRIPTION:${desc}\r\n`;
    if (b.theme) ics += `CATEGORIES:${b.theme}\r\n`;
    ics += 'END:VEVENT\r\n';
    count++;
  });

  if (!count) { showToast('出力できるスケジュールがありません'); return; }
  ics += 'END:VCALENDAR';

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `schedule_${ds.replace(/-/g,'')}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('ICSファイルを出力しました');
}

// CSV のフィールドを安全にエスケープ
function csvField(v) {
  const s = String(v ?? '');
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? `"${s.replace(/"/g, '""')}"` : s;
}

// CSV テキストを [[行], [行]...] に変換（引用符・改行対応）
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // BOM除去
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= text.length; i++) {
    const c = text[i];
    if (c === undefined) { row.push(field); if (row.some(f => f)) rows.push(row); break; }
    if (c === '"') {
      if (inQ && text[i + 1] === '"') { field += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { row.push(field); field = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      row.push(field); field = '';
      if (c === '\r' && text[i + 1] === '\n') i++;
      if (row.some(f => f)) rows.push(row);
      row = [];
    } else { field += c; }
  }
  return rows;
}

function exportGoals() {
  const d = new Date();
  const statusLabel = { notStarted: '未着手', planning: '計画中', inProgress: '進行中', done: '達成' };
  const header = ['番号', 'タイトル', 'カテゴリ', 'ステータス', 'テーマ', 'メモ'];
  const sorted = [...S.goals].sort((a, b) => a.number - b.number);
  const rows   = sorted.map(g => [
    g.number, g.title, g.category || '',
    statusLabel[g.status] || '未着手',
    g.theme || '', g.memo || '',
  ].map(csvField).join(','));

  // UTF-8 BOM付き（Excel で文字化けしないように）
  const csv      = '﻿' + [header.join(','), ...rows].join('\r\n');
  const filename = `goals_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.csv`;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`📤 やること100を CSV で出力しました（${sorted.length}件）`);
}

document.getElementById('goals-import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;

      if (file.name.toLowerCase().endsWith('.csv')) {
        // ── CSV インポート ──
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('データ行がありません');
        const hdr     = rows[0];
        const col     = k => hdr.indexOf(k);
        const cNum    = col('番号'), cTitle = col('タイトル'), cCat = col('カテゴリ');
        const cStatus = col('ステータス'), cTheme = col('テーマ'), cMemo = col('メモ');
        if (cTitle === -1) throw new Error('「タイトル」列が見つかりません');
        const statusMap = { '未着手': 'notStarted', '計画中': 'planning', '進行中': 'inProgress', '達成': 'done' };
        const usedNums  = new Set();
        const imported  = rows.slice(1).filter(r => r[cTitle]?.trim()).map(r => {
          let num = cNum >= 0 ? parseInt(r[cNum]) : NaN;
          if (isNaN(num) || num < 1 || usedNums.has(num)) {
            num = 1; while (usedNums.has(num)) num++;
          }
          usedNums.add(num);
          return {
            id: uuid(), number: num,
            title:    r[cTitle]?.trim() || '',
            category: ['仕事','個人','その他'].includes(r[cCat]) ? r[cCat] : '仕事',
            status:   statusMap[r[cStatus]] || 'notStarted',
            theme:    cTheme >= 0 ? (r[cTheme] || '') : '',
            memo:     cMemo  >= 0 ? (r[cMemo]  || '') : '',
            doneAt: null, createdAt: new Date().toISOString(),
          };
        });
        if (!imported.length) throw new Error('有効なデータが見つかりません');
        if (!confirm(`${imported.length}件の目標を読み込みます。現在のデータは上書きされます。よろしいですか？`)) return;
        S.goals = imported;

      } else {
        // ── JSON フォールバック ──
        const data     = JSON.parse(text);
        const imported = data.goals || (Array.isArray(data) ? data : null);
        if (!Array.isArray(imported)) throw new Error('goals 配列が見つかりません');
        if (!confirm(`${imported.length}件の目標を読み込みます。現在のデータは上書きされます。よろしいですか？`)) return;
        S.goals = imported;
      }

      saveGoals(); renderAll();
      showToast(`✅ ${S.goals.length}件の目標を読み込みました`);
    } catch (err) { alert('読み込みエラー: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.tasks)) throw new Error();
      S.tasks       = data.tasks;
      S.goals       = data.goals       || [];
      S.blocks      = data.blocks      || [];
      S.completions = data.completions || [];
      S.projects    = data.projects    || [];
      S.reviews     = data.reviews     || [];
      if (data.themes) S.themes = data.themes;
      saveTasks(); saveGoals(); saveBlocks(); saveCompletions(); saveThemes(); saveProjects(); saveReviews();
      renderAll();
      showToast('インポートしました');
    } catch { alert('不正なJSONファイルです'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

let _travelLat = null, _travelLng = null, _travelSpots = [];

function saveGeminiModel() {
  const val = document.getElementById('gemini-model-input').value.trim();
  if (!val) { showToast('モデル名を入力してください'); return; }
  localStorage.setItem('todo_gemini_model', val);
  showToast('モデルを保存しました: ' + val);
}

function saveGeminiApiKey() {
  const val = document.getElementById('claude-key-input').value.trim();
  if (!val) { showToast('APIキーを入力してください'); return; }
  localStorage.setItem('todo_gemini_api_key', val);
  showToast('Gemini APIキーを保存しました');
}

function getGeoLocation() {
  const txt = document.getElementById('travel-loc-text');
  txt.textContent = '📍 取得中...';
  if (!navigator.geolocation) {
    txt.textContent = '📍 このブラウザは位置情報に対応していません';
    document.getElementById('travel-loc-manual').style.display = '';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      _travelLat = pos.coords.latitude;
      _travelLng = pos.coords.longitude;
      txt.textContent = `📍 緯度 ${_travelLat.toFixed(4)}, 経度 ${_travelLng.toFixed(4)}`;
      document.getElementById('travel-loc-manual').style.display = 'none';
    },
    err => {
      txt.textContent = '📍 位置取得に失敗しました（手動入力してください）';
      document.getElementById('travel-loc-manual').style.display = '';
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function searchByPlace() {
  const q = document.getElementById('travel-place-input').value.trim();
  if (!q) { showToast('場所名を入力してください'); return; }
  const locText = document.getElementById('travel-loc-text');
  locText.textContent = '🔍 検索中...';
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=jp&accept-language=ja`,
      { headers: { 'Accept-Language': 'ja' } }
    );
    const data = await res.json();
    if (!data.length) { locText.textContent = '📍 位置が未取得です'; showToast('場所が見つかりませんでした'); return; }
    _travelLat = parseFloat(data[0].lat);
    _travelLng = parseFloat(data[0].lon);
    const name = data[0].display_name.split(',')[0];
    locText.textContent = `📍 ${name}（緯度 ${_travelLat.toFixed(4)}, 経度 ${_travelLng.toFixed(4)}）`;
    locText.style.color = 'var(--text)';
    showToast(`📍 ${name} を設定しました`);
  } catch (e) {
    locText.textContent = '📍 位置が未取得です';
    showToast('場所の検索に失敗しました: ' + e.message);
  }
}

function setManualLocation() {
  const lat = parseFloat(document.getElementById('travel-lat').value);
  const lng = parseFloat(document.getElementById('travel-lng').value);
  if (isNaN(lat) || isNaN(lng)) { showToast('緯度・経度を正しく入力してください'); return; }
  _travelLat = lat; _travelLng = lng;
  document.getElementById('travel-loc-text').textContent = `📍 緯度 ${lat.toFixed(4)}, 経度 ${lng.toFixed(4)}（手動）`;
  showToast('位置を設定しました');
}

async function searchNearbySpots() {
  if (_travelLat === null) { showToast('先に現在地を取得してください'); return; }

  const categories = [...document.querySelectorAll('input[name=travel-cat]:checked')].map(el => el.value);
  const rangeStr   = document.querySelector('input[name=travel-range]:checked')?.value || '1km';
  const keyword    = document.getElementById('travel-keyword').value.trim().toLowerCase();
  const rangeM     = rangeStr === '500m' ? 500 : parseInt(rangeStr) * 1000;

  if (!categories.length) { showToast('カテゴリを1つ以上選択してください'); return; }

  const resultDiv  = document.getElementById('travel-result');
  const spotList   = document.getElementById('travel-spot-list');
  resultDiv.style.display = '';
  document.getElementById('travel-summary').textContent = '';
  const lat = _travelLat, lng = _travelLng;
  const needGourmet = categories.includes('グルメ');
  spotList.innerHTML = `<div class="travel-generating">🔍 スポットを検索中…</div>`;

  // カテゴリ → Wikipedia タイトルキーワード
  const catKeywords = {
    'グルメ':      /料理|食堂|レストラン|ラーメン|うどん|そば|寿司|焼肉|cafe|カフェ/i,
    '観光':        /神社|shrine|寺|temple|城|宮|史跡|名所|観光/i,
    '自然':        /公園|park|山|川|滝|湖|池|森|庭園|海|浜|自然/i,
    '体験':        /博物館|美術館|museum|動物園|水族館|遊園地|体験|工場/i,
    'ショッピング': /商店|市場|百貨店|ショッピング|モール|商業/i,
  };
  const stayMap = { 'グルメ': 60, '観光': 90, '自然': 60, '体験': 120, 'ショッピング': 90 };

  try {
    // Wikipedia（観光・自然など）と Nominatim グルメを並列取得
    const radius = Math.min(rangeM, 10000);
    const [wikiElements, gourmetRaw] = await Promise.all([

      // ── Wikipedia Geosearch ──
      (async () => {
        const geoData = await fetch(
          `https://ja.wikipedia.org/w/api.php?action=query&list=geosearch`
          + `&gscoord=${lat}|${lng}&gsradius=${radius}&gslimit=50&format=json&origin=*`
        ).then(r => r.json());
        const pages = geoData.query?.geosearch || [];
        if (!pages.length) return [];
        const extData = await fetch(
          `https://ja.wikipedia.org/w/api.php?action=query&pageids=${pages.map(p => p.pageid).join('|')}`
          + `&prop=extracts&exintro&exsentences=2&format=json&origin=*`
        ).then(r => r.json());
        const details = extData.query?.pages || {};
        return pages.map(p => {
          const ext  = details[p.pageid];
          const desc = (ext?.extract || '').replace(/<[^>]+>/g, '').trim().slice(0, 80) || '観光スポット';
          const dist = calcSpotDistance(lat, lng, p.lat, p.lon);
          let category = '観光';
          for (const [cat, re] of Object.entries(catKeywords)) {
            if (re.test(p.title)) { category = cat; break; }
          }
          return { name: p.title, category, description: desc,
            recommend: `現在地から約${dist < 1000 ? dist+'m' : (dist/1000).toFixed(1)+'km'}`,
            stayMinutes: stayMap[category] || 60, dist, lat: p.lat, lng: p.lon, tags: {},
            wikiUrl: `https://ja.wikipedia.org/wiki/${encodeURIComponent(p.title)}` };
        });
      })(),

      // ── Nominatim グルメ（グルメ選択時のみ）──
      needGourmet ? fetchGourmetSpots(lat, lng, rangeM) : Promise.resolve([]),
    ]);

    // Nominatim 結果をスポット形式に変換
    const gourmetElements = gourmetRaw.map(p => {
      const dist = calcSpotDistance(lat, lng, parseFloat(p.lat), parseFloat(p.lon));
      const addr = [p.address?.suburb, p.address?.quarter, p.address?.road].filter(Boolean).join(' ');
      const cuisine = p.extratags?.cuisine ? p.extratags.cuisine.replace(/[_;]/g, '・') : '';
      return { name: p.name, category: 'グルメ',
        description: [cuisine, addr].filter(Boolean).join(' ／ ') || 'グルメスポット',
        recommend: `現在地から約${dist < 1000 ? dist+'m' : (dist/1000).toFixed(1)+'km'}`,
        stayMinutes: 60, dist, lat: parseFloat(p.lat), lng: parseFloat(p.lon),
        tags: p.extratags || {}, wikiUrl: null };
    });

    // マージ → カテゴリフィルター → キーワードフィルター → ソート
    let elements = [...wikiElements, ...gourmetElements];
    const filtered = elements.filter(e => categories.includes(e.category));
    if (filtered.length) elements = filtered;
    if (keyword) elements = elements.filter(e =>
      e.name.toLowerCase().includes(keyword) || e.description.toLowerCase().includes(keyword)
    );
    elements.sort((a, b) => a.dist - b.dist);
    elements = elements.slice(0, 20);

    _travelSpots = elements;
    const srcLabel = needGourmet && categories.length > 1 ? 'Wikipedia + OpenStreetMap'
                   : needGourmet ? 'OpenStreetMap'
                   : 'Wikipedia';
    const summary = elements.length
      ? `📍 ${rangeStr}以内に ${elements.length}件見つかりました（${srcLabel}）`
      : `${rangeStr}以内にスポットが見つかりませんでした`;
    renderSpotResult(_travelSpots, summary);
    if (!elements.length) showToast('範囲を広げるか、別の地名で試してください');

  } catch (e) {
    spotList.innerHTML = `<div style="padding:12px;font-size:13px">
      <div style="color:var(--high);margin-bottom:10px">❌ ${h(e.message)}</div>
      <button class="btn btn-sm btn-primary" onclick="searchNearbySpots()">🔄 再試行</button>
    </div>`;
    showToast('検索に失敗しました');
  }
}

// Nominatim で近隣グルメスポットを取得
async function fetchGourmetSpots(lat, lng, rangeM) {
  const delta = rangeM / 111000;
  const vb   = `${(lng - delta).toFixed(6)},${(lat + delta).toFixed(6)},${(lng + delta).toFixed(6)},${(lat - delta).toFixed(6)}`;
  const base = `https://nominatim.openstreetmap.org/search?format=json&accept-language=ja`
             + `&addressdetails=1&extratags=1&bounded=1&viewbox=${vb}&limit=20`;
  const results = await Promise.all(
    ['restaurant', 'cafe', 'fast_food'].map(a =>
      fetch(`${base}&amenity=${a}`, { signal: AbortSignal.timeout(8000) })
        .then(r => r.json()).catch(() => [])
    )
  );
  // 重複除去（名前+座標で判定）
  const seen = new Set();
  return results.flat().filter(p => {
    if (!p.name) return false;
    const key = `${p.name}|${(+p.lat).toFixed(4)}|${(+p.lon).toFixed(4)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function calcSpotDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(a)));
}

function renderSpotResult(spots, summary) {
  document.getElementById('travel-summary').innerHTML = summary;
  const list = document.getElementById('travel-spot-list');
  if (!spots.length) { list.innerHTML = '<div style="color:var(--text-muted);font-size:13px">スポットが見つかりませんでした</div>'; return; }
  list.innerHTML = spots.map((s, i) => `
    <div class="travel-spot-card">
      <div class="travel-spot-card-header">
        <div>
          <div class="travel-cat-badge">${h(s.category||'')}</div>
          <div class="travel-spot-name">${h(s.name)}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-sm" onclick="showSpotDetail(${i})">詳細</button>
          <button class="btn btn-sm btn-primary" style="white-space:nowrap" onclick="toggleRegisterForm(${i})">📅 登録</button>
        </div>
      </div>
      <div class="travel-spot-desc">${h(s.description||'')}</div>
      ${s.recommend ? `<div class="travel-spot-notes">💡 ${h(s.recommend)}</div>` : ''}
      <div class="travel-spot-meta">⏱ 滞在目安: ${s.stayMinutes||60}分</div>
      <div id="travel-register-${i}" class="travel-register-form" style="display:none">
        <div class="form-group"><label style="font-size:11px">日付</label><input type="date" id="travel-reg-date-${i}"></div>
        <div class="form-group"><label style="font-size:11px">開始</label><input type="time" id="travel-reg-start-${i}"></div>
        <div class="form-group"><label style="font-size:11px">終了</label><input type="time" id="travel-reg-end-${i}"></div>
        <button class="btn btn-primary btn-sm" style="flex-shrink:0;align-self:flex-end" onclick="registerSpotToBlock(${i})">登録</button>
      </div>
    </div>`).join('');
}

function showSpotDetail(idx) {
  const s = _travelSpots[idx];
  if (!s) return;
  const t = s.tags || {};

  // 表示するフィールド定義
  const rows = [
    ['カテゴリ',   s.category],
    ['距離',       s.recommend],
    ['滞在目安',   s.stayMinutes ? s.stayMinutes + '分' : null],
    ['料理・種別', t.cuisine ? t.cuisine.replace(/[_;]/g, ' / ') : null],
    ['営業時間',   t.opening_hours],
    ['電話',       t.phone || t['contact:phone']],
    ['ウェブサイト', t.website || t['contact:website']],
    ['住所',       t['addr:full'] || [t['addr:province'], t['addr:city'], t['addr:quarter'], t['addr:street'], t['addr:housenumber']].filter(Boolean).join('')],
    ['備考',       t.description || t['description:ja']],
  ].filter(([, v]) => v);

  const mapUrl = s.lat && s.lng
    ? `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`
    : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name)}`;

  document.getElementById('spot-detail-title').textContent = s.name;
  document.getElementById('spot-detail-body').innerHTML = `
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      ${rows.map(([label, val]) => `
        <tr style="border-bottom:1px solid var(--border)">
          <td style="padding:7px 8px 7px 0;color:var(--text-muted);white-space:nowrap;width:90px">${h(label)}</td>
          <td style="padding:7px 0;word-break:break-all">${h(val)}</td>
        </tr>`).join('')}
    </table>
    <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px">
      <a href="${mapUrl}" target="_blank" rel="noopener" class="btn btn-sm btn-primary" style="text-decoration:none">🗺️ Google Mapsで見る</a>
      ${s.wikiUrl ? `<a href="${h(s.wikiUrl)}" target="_blank" rel="noopener" class="btn btn-sm" style="text-decoration:none">📖 Wikipedia</a>` : ''}
      <button class="btn btn-sm btn-primary" onclick="document.getElementById('modal-spot-detail').style.display='none';toggleRegisterForm(${idx})">📅 カレンダーに登録</button>
      <button class="btn btn-sm" onclick="document.getElementById('modal-spot-detail').style.display='none'">閉じる</button>
    </div>`;
  document.getElementById('modal-spot-detail').style.display = 'flex';
}

function toggleRegisterForm(idx) {
  const form = document.getElementById('travel-register-' + idx);
  if (!form) return;
  const visible = form.style.display !== 'none';
  form.style.display = visible ? 'none' : '';
  if (!visible) {
    document.getElementById('travel-reg-date-' + idx).value = tod;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const startTime = hh + ':' + mm;
    const stayMin = _travelSpots[idx]?.stayMinutes || 60;
    const endDate = new Date(now.getTime() + stayMin * 60000);
    const eh = String(endDate.getHours()).padStart(2, '0');
    const em = String(endDate.getMinutes()).padStart(2, '0');
    document.getElementById('travel-reg-start-' + idx).value = startTime;
    document.getElementById('travel-reg-end-' + idx).value = eh + ':' + em;
  }
}

function registerSpotToBlock(idx) {
  const s = _travelSpots[idx];
  if (!s) return;
  const date      = document.getElementById('travel-reg-date-'  + idx).value;
  const startTime = document.getElementById('travel-reg-start-' + idx).value;
  const endTime   = document.getElementById('travel-reg-end-'   + idx).value;
  if (!date || !startTime || !endTime) { showToast('日付と時刻を入力してください'); return; }
  addBlock({ title: s.name, theme: '旅行', date, startTime, endTime });
  showToast(`「${s.name}」をカレンダーに登録しました`);
  renderAll();
  toggleRegisterForm(idx);
}

function showPage(page) {
  S.page = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page===page));
  if (page==='goals')    renderGoalGrid();
  if (page==='todo')     { renderTodoList(); renderCalendar(); }
  if (page==='projects') renderProjectList();
}

// モバイル用パネル切替（タスク ↔ スケジューラー）
function switchMobilePanel(panel) {
  const todoPnl = document.getElementById('panel-todo');
  const calPnl  = document.getElementById('panel-calendar');
  const tabs    = document.querySelectorAll('.mobile-tab');
  if (panel === 'todo') {
    todoPnl.classList.remove('mobile-hidden');
    calPnl.classList.add('mobile-hidden');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
  } else {
    todoPnl.classList.add('mobile-hidden');
    calPnl.classList.remove('mobile-hidden');
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    renderCalendar();
  }
}

//  FORM: ADD TASK
// ──────────────────────────────────────────────
function toggleAddFormDetail() {
  // 800px以上のPCでは何もしない
  if (window.innerWidth >= 800) return;
  const detail = document.getElementById('add-task-detail');
  const btn    = document.getElementById('add-detail-toggle-btn');
  const form   = document.getElementById('add-task-form');
  const isOpen = !detail.classList.contains('collapsed');
  if (isOpen) {
    detail.classList.add('collapsed');
    btn.textContent = '詳細 ▼';
    form.classList.remove('detail-open');
  } else {
    detail.classList.remove('collapsed');
    btn.textContent = '詳細 ▲';
    form.classList.add('detail-open');
  }
}

// 起動時にモバイルでは折りたたみ状態にする
function initAddFormDetail() {
  if (window.innerWidth < 800) {
    const detail = document.getElementById('add-task-detail');
    if (detail) detail.classList.add('collapsed');
  }
}

function handleAddTask(e) {
  e.preventDefault();
  const title = document.getElementById('task-title').value.trim();
  if (!title) return;
  const cat = document.getElementById('task-category').value;
  addTask({
    title,
    dueDate:  document.getElementById('task-due-date').value || null,
    category: cat,
    priority: document.getElementById('task-priority').value,
    scale:    document.getElementById('task-scale').value,
    theme:         cat==='work' ? (document.getElementById('task-theme').value || null) : null,
    goalId:        document.getElementById('task-goal').value || null,
    projectId:     cat==='work' ? (document.getElementById('task-project').value || null) : null,
    recurrence:    document.getElementById('task-recur').value || null,
    recurrenceEnd: document.getElementById('task-recur-end').value || null,
  });
  document.getElementById('task-title').value = '';
  renderAll();
  showToast('タスクを追加しました');
}

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {

    chip.classList.add('active');

});

// ──────────────────────────────────────────────
//  MODAL: close on overlay click
// ──────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target===overlay) closeAllModals(); });
});

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
function init() {
  loadAll();
  // バージョン表示
  const verEl = document.getElementById('app-version');
  if (verEl) verEl.textContent = APP_VERSION;
  buildThemeSelect('task-theme', 'work', '');
  buildGoalSelect('task-goal', '');
  buildProjectSelect('task-project', '');
  document.getElementById('travel-date').value = today();
  initAddFormDetail();
  // ブラウザの初回レイアウト完了後に描画（scrollTop等が正しく動作するよう1フレーム遅らせる）
  requestAnimationFrame(() => {
    renderAll();
  });
}

init();
