<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO & スケジューラー</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TODO">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #1d4ed8;
      --work: #3b82f6;
      --work-light: #dbeafe;
      --personal: #10b981;
      --personal-light: #d1fae5;
      --high: #ef4444;
      --medium-c: #f59e0b;
      --low: #9ca3af;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --goal-done: #10b981;
      --goal-progress: #f59e0b;
      --shadow: 0 1px 3px rgba(0,0,0,.1);
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      height: 100vh;           /* fallback */
      height: 100dvh;          /* iOS Safari アドレスバー対応 */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%; /* iOS フォントサイズ自動調整を抑制 */
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 50px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }
    .app-title { font-weight: 700; font-size: 15px; color: var(--primary); white-space: nowrap; }
    .nav-tabs { display: flex; gap: 4px; flex: 1; }
    .nav-tab {
      padding: 5px 14px; border-radius: 6px; border: none;
      background: transparent; cursor: pointer; font-size: 13px;
      color: var(--text-muted); font-family: inherit; transition: all .15s;
    }
    .nav-tab.active { background: var(--primary); color: #fff; font-weight: 500; }
    .header-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 12px;
      font-family: inherit; color: var(--text); transition: all .15s; white-space: nowrap;
      touch-action: manipulation; /* iOS 300ms遅延を除去 */
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    /* hover はマウス操作のみに限定 */
    @media (hover: hover) {
      .nav-tab:hover:not(.active) { background: var(--bg); }
      .btn:hover { background: var(--bg); }
      .btn-primary:hover { background: var(--primary-dark); }
    }
    /* タッチ時の :active フィードバック */
    .btn:active { opacity: .75; }
    .nav-tab:active:not(.active) { background: var(--bg); }
    .btn-sm { padding: 3px 8px; font-size: 11px; }
    .btn-danger { color: var(--high); }

    /* ── Pages ── */
    main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .page.active { display: flex; }

    /* ── TODO Layout ── */
    .todo-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── TODO Panel ── */
    .todo-panel {
      width: 370px; min-width: 300px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: var(--surface); overflow: hidden;
    }
    .panel-header {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 13px; display: flex;
      align-items: center; justify-content: space-between; flex-shrink: 0;
      background: var(--bg);
    }

    /* ── Add Form ── */
    .add-task-form { padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .form-row { display: flex; gap: 8px; margin-bottom: 7px; }
    .form-row:last-child { margin-bottom: 0; }
    .form-group { display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .form-group label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .form-title-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .form-title-row input { flex: 1; }
    input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea {
      width: 100%; padding: 5px 7px; border: 1px solid var(--border);
      border-radius: 5px; font-size: 12px; font-family: inherit;
      color: var(--text); background: var(--surface); transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

    /* ── Filters ── */
    .task-filters {
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0;
      background: var(--bg);
    }
    .filter-sep { width: 1px; background: var(--border); margin: 2px 2px; }
    .filter-chip {
      padding: 2px 9px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: 11px;
      font-family: inherit; color: var(--text-muted); transition: all .15s;
    }
    .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── Task List ── */
    .task-list { flex: 1; overflow-y: auto; padding: 8px 14px; -webkit-overflow-scrolling: touch; }
    .task-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 8px; border-radius: 6px; border: 1px solid var(--border);
      margin-bottom: 5px; background: var(--surface); transition: all .15s; cursor: pointer;
    }
    .task-item:hover { box-shadow: var(--shadow); border-color: #cbd5e1; }
    .task-item.completed { opacity: .55; }
    .task-item.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-item.overdue { border-left: 3px solid var(--high); }
    .task-item.highlighted { background: #eff6ff; border-color: var(--primary); }
    .task-checkbox { width: 15px; height: 15px; margin-top: 2px; cursor: pointer; flex-shrink: 0; accent-color: var(--primary); }
    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 12px; font-weight: 500; word-break: break-word; }
    .task-meta { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
    .badge {
      padding: 1px 5px; border-radius: 4px; font-size: 10px;
      font-weight: 500; white-space: nowrap; line-height: 1.4;
    }
    .badge-work { background: var(--work-light); color: var(--work); }
    .badge-personal { background: var(--personal-light); color: var(--personal); }
    .badge-high { background: #fee2e2; color: var(--high); }
    .badge-medium { background: #fef3c7; color: #d97706; }
    .badge-low { background: #f1f5f9; color: var(--text-muted); }
    .badge-scale-large { background: #f3e8ff; color: #7c3aed; }
    .badge-scale-medium { background: #e0f2fe; color: #0369a1; }
    .badge-scale-small { background: #f0fdf4; color: #15803d; }
    .badge-due { background: #f1f5f9; color: var(--text-muted); }
    .badge-due.overdue { background: #fee2e2; color: var(--high); }
    .badge-goal { background: #fef3c7; color: #92400e; }
    .badge-scheduled { background: #dbeafe; color: #1d4ed8; }
    .badge-theme { background: #ede9fe; color: #6d28d9; }
    .badge-recur { background: #fce7f3; color: #9d174d; }
    .recur-date-list { max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
    .recur-date-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; cursor: pointer; font-size: 12px;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .recur-date-row:last-child { border-bottom: none; }
    .recur-date-row:hover { background: #f0f9ff; }
    .recur-done-row { background: #f0fdf4; }
    .recur-done-row:hover { background: #dcfce7; }
    .recur-chk { font-size: 14px; color: var(--primary); flex-shrink: 0; }
    .recur-done-row .recur-chk { color: var(--goal-done); }
    .recur-done-row .recur-date-label { text-decoration: line-through; color: var(--text-muted); }
    .task-actions { display: flex; gap: 3px; flex-shrink: 0; margin-top: 1px; }

    /* ── Calendar Panel ── */
    .calendar-panel {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--surface);
    }
    .calendar-toolbar {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg);
      flex-wrap: wrap;
    }
    .view-switcher { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .view-btn {
      padding: 4px 11px; border: none; background: transparent; cursor: pointer;
      font-size: 12px; font-family: inherit; color: var(--text-muted);
      border-right: 1px solid var(--border); transition: all .15s;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: var(--primary); color: #fff; }
    .calendar-nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .nav-btn:hover { background: var(--border); }
    .calendar-title { font-weight: 600; font-size: 13px; min-width: 160px; text-align: center; }
    .calendar-container { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }

    /* ── Month View ── */
    .month-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      grid-template-rows: 28px repeat(6, 1fr);
      height: 100%; min-height: 420px;
    }
    .month-hdr {
      padding: 5px; text-align: center; font-size: 11px; font-weight: 600;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border); background: var(--bg);
    }
    .month-cell {
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 3px; min-height: 70px; cursor: pointer; overflow: hidden;
    }
    .month-cell:hover { background: #f8fafc; }
    .month-cell.today-bg { background: #eff6ff; }
    .month-cell.other-month .day-num { color: #cbd5e1; }
    .day-num { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 1px; display: inline-block; }
    .day-num.today-circle {
      background: var(--primary); color: #fff; width: 20px; height: 20px;
      border-radius: 50%; display: inline-flex; align-items: center;
      justify-content: center; font-size: 10px;
    }
    .month-chip {
      font-size: 10px; padding: 1px 4px; border-radius: 3px;
      margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; cursor: pointer; display: block;
    }
    .month-chip.work { background: var(--work-light); color: var(--work); }
    .month-chip.personal { background: var(--personal-light); color: var(--personal); }
    .month-chip.done { opacity: .45; text-decoration: line-through; }
    .month-more { font-size: 9px; color: var(--text-muted); }

    /* ── Week / Day View ── */
    .time-view-wrap { min-width: 500px; }
    .time-hdr-row {
      display: grid; border-bottom: 2px solid var(--border);
      position: sticky; top: 0; background: var(--surface); z-index: 5;
    }
    .time-hdr-col { padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 600; border-right: 1px solid var(--border); }
    .time-hdr-col.today-col { color: var(--primary); }
    .allday-row { display: grid; border-bottom: 2px solid var(--border); background: var(--bg); }
    .allday-label { font-size: 10px; color: var(--text-muted); padding: 3px 4px; border-right: 1px solid var(--border); display: flex; align-items: center; }
    .allday-cell { padding: 2px; min-height: 22px; border-right: 1px solid var(--border); }
    .hour-rows { }
    .hour-row { display: grid; }
    .time-label {
      height: 44px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
      padding: 2px 4px; font-size: 10px; color: var(--text-muted);
      display: flex; align-items: flex-start; background: var(--bg); flex-shrink: 0;
    }
    .hour-cell {
      height: 44px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
      padding: 1px 2px; cursor: pointer; position: relative;
    }
    .hour-cell:hover { background: #f0f9ff; }
    .time-chip {
      font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; display: block;
    }
    .time-chip.work { background: var(--work-light); color: var(--work); border-left: 2px solid var(--work); }
    .time-chip.personal { background: var(--personal-light); color: var(--personal); border-left: 2px solid var(--personal); }
    .time-chip.done { opacity: .4; }
    /* Day view block layout */
    .day-task-area { flex: 1; position: relative; }
    .day-task-block {
      position: absolute; border-radius: 4px; padding: 3px 22px 3px 6px;
      cursor: pointer; overflow: hidden; font-size: 11px;
      border-left: 3px solid; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: box-shadow .15s, z-index 0s; z-index: 2;
    }
    .day-task-block:hover { box-shadow: 0 2px 10px rgba(0,0,0,.2); z-index: 10; }
    .day-task-block.work { background: var(--work-light); border-left-color: var(--work); color: #1e40af; }
    .day-task-block.personal { background: var(--personal-light); border-left-color: var(--personal); color: #065f46; }
    .day-task-block.done { opacity: .4; }
    .dtb-title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dtb-time { font-size: 10px; opacity: .75; }
    .dtb-detail { position: absolute; top: 3px; right: 4px; opacity: 0; transition: opacity .15s; font-size: 11px; cursor: pointer; }
    .day-task-block:hover .dtb-detail { opacity: .6; }
    .day-task-block:hover .dtb-detail:hover { opacity: 1; }

    /* ── Goals Page ── */
    .goals-page { flex: 1; overflow-y: auto; padding: 14px; -webkit-overflow-scrolling: touch; }
    .goals-progress {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .progress-title {
      font-weight: 700; font-size: 14px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .progress-bar { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; margin-bottom: 6px; border: 1px solid var(--border); }
    .progress-fill { height: 100%; background: var(--goal-done); border-radius: 5px; transition: width .4s; }
    .progress-stats { font-size: 11px; color: var(--text-muted); display: flex; gap: 14px; flex-wrap: wrap; }
    .goals-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .goal-cell {
      aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; padding: 3px; font-size: 10px; text-align: center;
      transition: all .15s; position: relative; overflow: hidden;
      background: #f8fafc;
    }
    .goal-cell:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); transform: scale(1.03); }
    .goal-cell.done { background: #d1fae5; border-color: var(--goal-done); }
    .goal-cell.inProgress { background: #fef3c7; border-color: var(--goal-progress); }
    .goal-cell.notStarted { background: var(--surface); }
    .goal-cell-num { font-size: 8px; color: var(--text-muted); font-weight: 700; line-height: 1; }
    .goal-cell-title {
      font-size: 8px; line-height: 1.2; word-break: break-all;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .goal-cell.done::after {
      content: '✓'; position: absolute; top: 1px; right: 3px;
      font-size: 9px; color: var(--goal-done); font-weight: 700;
    }
    /* ── Goal List View ── */
    .goal-view-toggle { display: flex; gap: 6px; }
    .goal-view-toggle .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .goal-group-cat {
      margin-bottom: 16px;
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .goal-group-cat-header {
      padding: 10px 14px;
      background: #f1f5f9;
      font-weight: 700; font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .goal-group-theme {
      border-bottom: 1px solid var(--border);
    }
    .goal-group-theme:last-child { border-bottom: none; }
    .goal-group-theme-header {
      padding: 7px 14px 7px 24px;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .goal-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px 9px 32px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer; transition: background .15s;
      font-size: 13px;
    }
    .goal-list-item:last-child { border-bottom: none; }
    .goal-list-item:hover { background: #f8fafc; }
    .goal-list-item.done { color: var(--text-muted); text-decoration: line-through; }
    .goal-list-item.inProgress { font-weight: 600; }
    .goal-list-num {
      min-width: 26px; font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-align: right;
    }
    .goal-list-status {
      font-size: 14px; line-height: 1; flex-shrink: 0;
    }
    .goal-list-title { flex: 1; }
    .goal-list-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .goal-list-badge.done-b { background: #d1fae5; color: #065f46; }
    .goal-list-badge.prog-b { background: #fef3c7; color: #92400e; }
    .goal-list-badge.ns-b   { background: #f1f5f9; color: var(--text-muted); }

    /* ── Work Blocks ── */
    .day-block {
      position: absolute; border-radius: 6px; left: 3px; right: 3px;
      background: #ede9fe; border-left: 3px solid #7c3aed;
      padding: 4px 7px; cursor: pointer; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1); z-index: 2;
    }
    .day-block:hover { background: #ddd6fe; }
    .day-block-hdr {
      font-size: 11px; font-weight: 700; color: #5b21b6;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2px; white-space: nowrap;
    }
    .day-block-time { font-weight: 400; opacity: .8; }
    .day-block-task {
      font-size: 10px; color: #6d28d9; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
    }
    .day-block-task.done-t { text-decoration: line-through; opacity: .55; }
    .badge-block { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
    .block-task-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px;
    }
    .block-task-row:last-child { border-bottom: none; }
    .block-section-title {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .04em;
      margin: 12px 0 6px;
    }
    .week-block-chip {
      font-size: 9px; background: #ede9fe; color: #5b21b6;
      border-radius: 3px; padding: 1px 4px; margin: 1px 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: pointer; border-left: 2px solid #7c3aed;
    }

    /* ── Modals ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      width: 480px; max-width: 95vw; max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .modal-lg { width: 560px; }
    .modal-sm { width: 360px; }
    .modal-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-title { font-weight: 600; font-size: 14px; }
    .modal-close {
      background: none; border: none; font-size: 18px; cursor: pointer;
      color: var(--text-muted); padding: 1px 6px; border-radius: 4px;
      line-height: 1;
    }
    .modal-close:hover { background: var(--bg); }
    .modal-body { padding: 14px 18px; }
    .modal-footer {
      padding: 10px 18px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
      position: sticky; bottom: 0; background: var(--surface);
    }
    .mb8 { margin-bottom: 8px; }
    .detail-row { display: flex; gap: 10px; margin-bottom: 7px; align-items: flex-start; }
    .detail-label { font-size: 11px; color: var(--text-muted); width: 76px; flex-shrink: 0; padding-top: 2px; }
    .linked-tasks-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .linked-task-item {
      display: flex; gap: 8px; align-items: center;
      padding: 5px 6px; border-radius: 5px; cursor: pointer; font-size: 12px;
    }
    .linked-task-item:hover { background: var(--bg); }

    /* Settings */
    .theme-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 10px; background: var(--bg); border-radius: 5px; font-size: 12px;
      margin-bottom: 4px;
    }
    .theme-add-row { display: flex; gap: 8px; margin-top: 8px; }
    .section-title { font-weight: 600; font-size: 13px; margin-bottom: 8px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 18px; right: 18px;
      background: #1e293b; color: #fff; padding: 9px 15px;
      border-radius: 8px; font-size: 13px; z-index: 200;
      opacity: 0; transform: translateY(8px); transition: all .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Responsive */
    /* モバイル用パネル切替タブ（PCでは非表示） */
    .mobile-panel-tabs { display: none; }

    @media (max-width: 800px) {
      .mobile-panel-tabs {
        display: flex; flex-shrink: 0;
        border-bottom: 1px solid var(--border); background: var(--bg);
      }
      .mobile-tab {
        flex: 1; padding: 9px 0; border: none; background: transparent;
        font-size: 13px; font-family: inherit; color: var(--text-muted);
        cursor: pointer; font-weight: 500; border-bottom: 2px solid transparent;
        touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      }
      .mobile-tab.active {
        color: var(--primary); border-bottom-color: var(--primary); background: var(--surface);
      }
      .todo-layout { flex-direction: column; }
      .todo-panel {
        width: 100%; min-width: unset; border-right: none;
        flex: 1; max-height: unset;
      }
      .todo-panel.mobile-hidden { display: none; }
      .calendar-panel { flex: 1; }
      .calendar-panel.mobile-hidden { display: none; }
      .goals-grid { grid-template-columns: repeat(5, 1fr); }
    }
    @media (max-width: 480px) {
      .goals-grid { grid-template-columns: repeat(4, 1fr); }
      .app-title { font-size: 13px; }
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ════════════════ SCRIPT ════════════════ -->
<script>
'use strict';

// iOS 15.3 以下の crypto.randomUUID() 非対応対策
function uuid() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID.call(crypto);  // 再帰しないよう直接呼び出し
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
const S = {
  page: 'todo',
  tasks: [],
  goals: [],
  blocks: [],           // 作業枠 [{id, title, date, startTime, endTime, createdAt}]
  blockTemplates: [],   // テンプレート [{id, title, startTime, endTime, theme}]
  completions: [], // [{taskId, date}] — 繰り返しタスクの日付別完了ログ
  themes: { work: ['設備計画','導入','活用','人づくり','コミュ・雑務'], personal: [] },
  filter: { status: 'all', category: 'all', date: 'all' },
  calView: 'day',
  calDate: new Date(),
  highlightId: null,
  goalView: 'grid', // 'grid' | 'list'
};

let _blockEditId    = null; // 編集中ブロックID (null = 新規)
let _blockPendingTaskId = null; // ブロック作成後にリンクするタスクID

let _schedTaskId = null; // current task id for schedule modal (null = picker mode)

// ──────────────────────────────────────────────
//  STORAGE
// ──────────────────────────────────────────────
function loadAll() {
  S.tasks       = JSON.parse(localStorage.getItem('todo_tasks')       || '[]');
  S.goals       = JSON.parse(localStorage.getItem('todo_goals')       || '[]');
  S.blocks      = JSON.parse(localStorage.getItem('todo_blocks')      || '[]');
  S.completions = JSON.parse(localStorage.getItem('todo_completions') || '[]');
  const th = localStorage.getItem('todo_themes');
  if (th) S.themes = JSON.parse(th);
  S.blockTemplates = JSON.parse(localStorage.getItem('todo_block_templates') || '[]');
  // 旧データ移行: blockId (単数) → blockIds (配列)
  S.tasks.forEach(t => {
    if (!Array.isArray(t.blockIds)) {
      t.blockIds = t.blockId ? [t.blockId] : [];
      delete t.blockId;
    }
  });
}
const saveTasks       = () => localStorage.setItem('todo_tasks',       JSON.stringify(S.tasks));
const saveGoals       = () => localStorage.setItem('todo_goals',       JSON.stringify(S.goals));
const saveBlocks      = () => localStorage.setItem('todo_blocks',      JSON.stringify(S.blocks));
const saveThemes      = () => localStorage.setItem('todo_themes',      JSON.stringify(S.themes));
const saveCompletions     = () => localStorage.setItem('todo_completions',     JSON.stringify(S.completions));
const saveBlockTemplates  = () => localStorage.setItem('todo_block_templates', JSON.stringify(S.blockTemplates));

// ──────────────────────────────────────────────
//  TASK CRUD
// ──────────────────────────────────────────────
function addTask(d) {
  S.tasks.unshift({
    id: uuid(), title: d.title,
    dueDate: d.dueDate || null, scheduledDate: null, scheduledTime: null, scheduledEndTime: null,
    blockIds: [],
    goalId: d.goalId || null, category: d.category || 'work',
    priority: d.priority || 'medium', scale: d.scale || 'small',
    theme: d.theme || null, completed: false,
    recurrence: d.recurrence || null, recurrenceEnd: d.recurrenceEnd || null,
    createdAt: new Date().toISOString(),
  });
  saveTasks();
}
function updateTask(id, data) {
  const i = S.tasks.findIndex(t => t.id === id);
  if (i === -1) return;
  S.tasks[i] = { ...S.tasks[i], ...data };
  saveTasks();
}
function deleteTask(id) {
  S.tasks = S.tasks.filter(t => t.id !== id);
  saveTasks();
}
function toggleComplete(id) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  if (t.recurrence) {
    toggleCompletion(id, today()); // 繰り返しタスクは今日の日付ログを操作
  } else {
    updateTask(id, { completed: !t.completed });
  }
}

// ──────────────────────────────────────────────
//  BLOCK CRUD
// ──────────────────────────────────────────────
function addBlock(d) {
  const b = {
    id: uuid(), title: d.title || '', theme: d.theme || '',
    date: d.date, startTime: d.startTime, endTime: d.endTime,
    createdAt: new Date().toISOString(),
  };
  S.blocks.push(b);
  saveBlocks();
  return b.id;
}
function addBlockTemplate(d) {
  if (!d.title && !d.startTime) return false;
  S.blockTemplates.push({ id: uuid(), title: d.title||'', startTime: d.startTime||'09:00', endTime: d.endTime||'10:00', theme: d.theme||'' });
  saveBlockTemplates();
  return true;
}
function deleteBlockTemplate(id) {
  S.blockTemplates = S.blockTemplates.filter(t => t.id !== id);
  saveBlockTemplates();
}
function applyBlockTemplate(templateId) {
  if (!templateId) return;
  const tpl = S.blockTemplates.find(t => t.id === templateId);
  if (!tpl) return;
  document.getElementById('bm-title').value = tpl.title;
  document.getElementById('bm-start').value = tpl.startTime;
  document.getElementById('bm-end').value   = tpl.endTime;
  document.getElementById('bm-theme').value = tpl.theme;
}

function updateBlock(id, data) {
  const i = S.blocks.findIndex(b => b.id === id);
  if (i === -1) return;
  S.blocks[i] = { ...S.blocks[i], ...data };
  saveBlocks();
}
function deleteBlock(id) {
  S.blocks = S.blocks.filter(b => b.id !== id);
  // 紐づくタスクの blockIds から削除
  S.tasks = S.tasks.map(t => ({
    ...t, blockIds: (t.blockIds || []).filter(bid => bid !== id),
  }));
  saveBlocks(); saveTasks();
}
function linkTaskToBlock(taskId, blockId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  const ids = Array.isArray(t.blockIds) ? t.blockIds : [];
  if (blockId && !ids.includes(blockId)) {
    updateTask(taskId, { blockIds: [...ids, blockId] });
  }
}
function unlinkTaskFromBlock(taskId, blockId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  updateTask(taskId, { blockIds: (t.blockIds || []).filter(id => id !== blockId) });
}
function getBlockById(id) { return S.blocks.find(b => b.id === id); }
function getBlockTasks(blockId) { return S.tasks.filter(t => (t.blockIds || []).includes(blockId)); }
function blockLabel(b) {
  if (!b) return '';
  return (b.title ? b.title + ' ' : '') + b.date + ' ' + b.startTime + '–' + b.endTime;
}

function addGoal(d) {
  S.goals.push({
    id: uuid(), number: d.number, title: d.title,
    category: d.category || '仕事', theme: d.theme || '',
    status: 'notStarted',
    memo: '', doneAt: null, createdAt: new Date().toISOString(),
  });
  saveGoals();
}
function updateGoal(id, data) {
  const i = S.goals.findIndex(g => g.id === id);
  if (i === -1) return;
  if (data.status === 'done' && S.goals[i].status !== 'done') data.doneAt = new Date().toISOString();
  if (data.status && data.status !== 'done') data.doneAt = null;
  S.goals[i] = { ...S.goals[i], ...data };
  saveGoals();
}
function deleteGoal(id) {
  S.goals = S.goals.filter(g => g.id !== id);
  S.tasks = S.tasks.map(t => t.goalId === id ? { ...t, goalId: null } : t);
  saveGoals(); saveTasks();
}
function nextGoalNum() {
  const used = new Set(S.goals.map(g => g.number));
  for (let i = 1; i <= 100; i++) { if (!used.has(i)) return i; }
  return null;
}

function addTheme(cat, name) {
  name = name.trim();
  if (!name || S.themes[cat].includes(name)) return false;
  S.themes[cat].push(name);
  saveThemes();
  return true;
}
function removeTheme(cat, name) {
  S.themes[cat] = S.themes[cat].filter(t => t !== name);
  saveThemes();
}

function h(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function dateStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function today() { return dateStr(new Date()); }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

const PRIORITY_LABEL = { high:'高', medium:'中', low:'低' };
const SCALE_LABEL    = { large:'大', medium:'中', small:'小' };

//  RENDER: TODO LIST
// ──────────────────────────────────────────────
function renderTodoList() {
  const { status, category, date } = S.filter;
  const tod = today();
  let tasks = S.tasks;
  if (status === 'active')    tasks = tasks.filter(t => {
    if (t.recurrence && date === 'today') return !isRecurringDone(t.id, tod);
    return !isTaskDone(t);
  });
  if (status === 'completed') tasks = tasks.filter(t =>  isTaskDone(t));
  if (category !== 'all')     tasks = tasks.filter(t => t.category === category);
  if (date === 'today')       tasks = tasks.filter(t => {
    if (t.dueDate === tod) return true;
    if (t.scheduledDate === tod) return true;
    if (isOccurrenceOnDate(t, tod) && !isRecurringDone(t.id, tod)) return true;
    if ((t.blockIds||[]).some(bid => { const b = getBlockById(bid); return b && b.date === tod; })) return true;
    return false;
  });

  const cnt = document.getElementById('task-count');
  cnt.textContent = `${tasks.length}件`;

  const list = document.getElementById('task-list');
  if (!tasks.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:24px;font-size:12px">タスクがありません</div>';
    return;
  }

  list.innerHTML = tasks.map(t => {
    const isDone  = isTaskDone(t);
    const overdue = t.dueDate && t.dueDate < tod && !isDone;
    const goal = t.goalId ? S.goals.find(g => g.id === t.goalId) : null;
    const scaleCls = t.scale === 'large' ? 'badge-scale-large' : t.scale === 'medium' ? 'badge-scale-medium' : 'badge-scale-small';
    const priCls = `badge-${t.priority}`;
    return `
<div class="task-item ${isDone?'completed':''} ${overdue?'overdue':''} ${S.highlightId===t.id?'highlighted':''}"
     data-id="${t.id}" onclick="openTaskDetail('${t.id}')">
  <input type="checkbox" class="task-checkbox" ${isDone?'checked':''}
    onclick="event.stopPropagation();toggleComplete('${t.id}');renderAll()">
  <div class="task-content">
    <div class="task-title">${h(t.title)}</div>
    <div class="task-meta">
      <span class="badge badge-${t.category==='work'?'work':'personal'}">${t.category==='work'?'仕事':'個人'}</span>
      <span class="badge ${priCls}">${PRIORITY_LABEL[t.priority]}</span>
      <span class="badge ${scaleCls}">${SCALE_LABEL[t.scale]}</span>
      ${t.theme?`<span class="badge badge-theme">${h(t.theme)}</span>`:''}
      ${(()=>{ if(!t.recurrence) return ''; const all=getOccurrenceDates(t); const done=all.filter(d=>isRecurringDone(t.id,d)).length; return `<span class="badge badge-recur">🔁${recurLabel(t)} ${done}/${all.length}</span>`; })()}
      ${t.dueDate?`<span class="badge badge-due ${overdue?'overdue':''}">📅${t.dueDate}</span>`:''}
      ${(t.blockIds||[]).map(bid=>{const blk=getBlockById(bid);return blk?`<span class="badge badge-block">📦${h(blk.title||blk.date+' '+blk.startTime)}</span>`:''}).join('')}
      ${goal?`<span class="badge badge-goal">🎯#${goal.number}</span>`:''}
    </div>
  </div>
  <div class="task-actions" onclick="event.stopPropagation()">
    <button class="btn btn-sm" title="作業枠にリンク" onclick="openBlockLink('${t.id}')">📦</button>
    <button class="btn btn-sm" title="削除" onclick="if(confirm('削除しますか？')){deleteTask('${t.id}');renderAll();}">🗑</button>
  </div>
</div>`;
  }).join('');

  if (S.highlightId) {
    setTimeout(() => {
      const el = list.querySelector(`[data-id="${S.highlightId}"]`);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);
  }
}

  const DN = ['日','月','火','水','木','金','土'];

// Tasks to show on a given date (due or scheduled)
// ── Recurrence helpers ──
function isOccurrenceOnDate(t, ds) {
  if (!t.recurrence || !t.scheduledDate) return false;
  if (ds < t.scheduledDate) return false;
  if (t.recurrenceEnd && ds > t.recurrenceEnd) return false;
  if (t.recurrence === 'daily') return true;
  if (t.recurrence === 'weekday') {
    const dow = new Date(ds + 'T12:00:00').getDay();
    return dow >= 1 && dow <= 5; // 月〜金
  }
  if (t.recurrence === 'weekly') {
    const base   = new Date(t.scheduledDate + 'T12:00:00');
    const target = new Date(ds            + 'T12:00:00');
    const diff   = Math.round((target - base) / 86400000);
    return diff >= 0 && diff % 7 === 0;
  }
  return false;
}
// 繰り返しタスクの完了ログヘルパー
function isRecurringDone(taskId, ds) {
  return S.completions.some(c => c.taskId === taskId && c.date === ds);
}
function toggleCompletion(taskId, ds) {
  const idx = S.completions.findIndex(c => c.taskId === taskId && c.date === ds);
  if (idx === -1) S.completions.push({ taskId, date: ds });
  else            S.completions.splice(idx, 1);
  saveCompletions();
}
// 繰り返しタスクの全発生日を配列で返す（上限 366 日）
function getOccurrenceDates(task) {
  if (!task.recurrence || !task.scheduledDate) return [];
  const endStr  = task.recurrenceEnd || today();
  const endDate = new Date(endStr + 'T12:00:00');
  const dates   = [];
  const cur     = new Date(task.scheduledDate + 'T12:00:00');
  while (cur <= endDate && dates.length < 366) {
    const dow = cur.getDay();
    if (task.recurrence !== 'weekday' || (dow >= 1 && dow <= 5)) {
      dates.push(dateStr(cur)); // weekday のみ平日をプッシュ
    }
    if (task.recurrence === 'weekly') cur.setDate(cur.getDate() + 7);
    else                              cur.setDate(cur.getDate() + 1);
  }
  return dates;
}
// すべての発生日が完了済みか
function isRecurringFullyDone(task) {
  const dates = getOccurrenceDates(task);
  return dates.length > 0 && dates.every(ds => isRecurringDone(task.id, ds));
}
// 通常・繰り返し両対応の完了判定
//   ds あり → その日付のみ判定（カレンダー表示用）
//   ds なし → 繰り返しは「全日完了」で判定（TODO一覧・全体ステータス用）
function isTaskDone(t, ds) {
  if (!t.recurrence) return t.completed;
  return ds ? isRecurringDone(t.id, ds) : isRecurringFullyDone(t);
}
function recurLabel(t) {
  if (!t.recurrence) return '';
  return t.recurrence === 'daily' ? '毎日' : t.recurrence === 'weekday' ? '毎日(平日)' : '毎週';
}

function tasksOnDate(ds) {
  const set = new Map();
  S.tasks.forEach(t => {
    if (t.dueDate === ds || t.scheduledDate === ds) { set.set(t.id, t); return; }
    if (t.recurrence && isOccurrenceOnDate(t, ds)) set.set(t.id, t);
  });
  return [...set.values()];
}
function scheduledOnDate(ds) {
  return S.tasks.filter(t =>
    (t.scheduledDate === ds && !t.recurrence) ||
    (t.recurrence && t.scheduledTime && isOccurrenceOnDate(t, ds))
  );
}

// ── Month ──
function renderMonth(con) {
  const d = S.calDate;
  const yr = d.getFullYear(), mo = d.getMonth();
  const tod = today();
  const DN = ['日','月','火','水','木','金','土'];

  const start = new Date(yr, mo, 1);
  start.setDate(start.getDate() - start.getDay());

  let html = `<div class="month-grid">`;
  DN.forEach((n,i) => {
    const col = i===0?'color:#ef4444':i===6?'color:#3b82f6':'';
    html += `<div class="month-hdr" style="${col}">${n}</div>`;
  });

  const cur = new Date(start);
  for (let r=0; r<6; r++) {
    for (let c=0; c<7; c++) {
      const ds = dateStr(cur);
      const isToday = ds === tod;
      const other = cur.getMonth() !== mo;
      const tasks = tasksOnDate(ds);
      const sunStyle = c===0?'color:#ef4444':c===6?'color:#3b82f6':'';
      html += `<div class="month-cell ${isToday?'today-bg':''} ${other?'other-month':''}" onclick="jumpToDay('${ds}')">
        <span class="day-num ${isToday?'today-circle':''}" style="${sunStyle}">${cur.getDate()}</span>`;
      tasks.slice(0,3).forEach(t => {
        html += `<div class="month-chip ${t.category} ${isTaskDone(t,ds)?'done':''}"
          onclick="event.stopPropagation();openTaskDetail('${t.id}')">${h(t.title)}</div>`;
      });
      if (tasks.length>3) html += `<div class="month-more">+${tasks.length-3}件</div>`;
      html += `</div>`;
      cur.setDate(cur.getDate()+1);
    }
  }
  html += `</div>`;
  con.innerHTML = html;
}

// ── Week ──
function renderWeek(con) {
  const d = S.calDate;
  const tod = today();
  const DN = ['日','月','火','水','木','金','土'];

  const ws = new Date(d);
  ws.setDate(d.getDate() - d.getDay());
  const days = Array.from({length:7}, (_,i) => { const x=new Date(ws); x.setDate(ws.getDate()+i); return x; });

  const cols = `grid-template-columns:50px repeat(7,1fr)`;
  let html = `<div class="time-view-wrap">`;

  // Header
  html += `<div class="time-hdr-row" style="${cols}">`;
  html += `<div class="time-hdr-col" style="background:var(--bg)"></div>`;
  days.forEach((day,i) => {
    const ds = dateStr(day);
    const col = i===0?'color:#ef4444':i===6?'color:#3b82f6':'';
    html += `<div class="time-hdr-col ${ds===tod?'today-col':''}" style="${col}">${DN[i]} ${day.getDate()}</div>`;
  });
  html += `</div>`;

  // All-day
  html += `<div class="allday-row" style="${cols}">`;
  html += `<div class="allday-label">終日</div>`;
  days.forEach(day => {
    const ds = dateStr(day);
    const allDay = S.tasks.filter(t => !t.scheduledTime && (
      t.dueDate===ds || (t.scheduledDate===ds && !t.recurrence) ||
      (t.recurrence && isOccurrenceOnDate(t, ds))
    ));
    const uniq = [...new Map(allDay.map(t=>[t.id,t])).values()];
    html += `<div class="allday-cell">`;
    uniq.forEach(t => {
      html += `<div class="time-chip ${t.category} ${isTaskDone(t,ds)?'done':''}"
        onclick="openTaskDetail('${t.id}')">${h(t.title)}</div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Hours
  html += `<div class="hour-rows">`;
  for (let hh=0; hh<24; hh++) {
    html += `<div class="hour-row" style="${cols}">`;
    html += `<div class="time-label">${pad(hh)}:00</div>`;
    days.forEach(day => {
      const ds = dateStr(day);
      const ts = S.tasks.filter(t => t.scheduledTime &&
        parseInt(t.scheduledTime.split(':')[0])===hh && (
          (t.scheduledDate===ds && !t.recurrence) ||
          (t.recurrence && isOccurrenceOnDate(t, ds))
        ));
      html += `<div class="hour-cell" onclick="openBlockModal(null,'${ds}','${pad(hh)}:00','${pad(Math.min(23,hh+1))}:00')">`;
      // 作業枠チップ（この時間帯を含むブロック）
      S.blocks.filter(b => b.date===ds && parseInt(b.startTime)<=hh && parseInt(b.endTime)>hh)
        .forEach(b => {
          const bTasks = getBlockTasks(b.id);
          html += `<div class="week-block-chip" onclick="event.stopPropagation();openBlockModal('${b.id}')">${h(b.title||'作業枠')} ${b.startTime}–${b.endTime}${bTasks.length?` (${bTasks.length})`:''}</div>`;
        });
      // スタンドアロンタスク（この日のblockに紐づいていないもの）
      const dayBlockIds = S.blocks.filter(b => b.date===ds).map(b => b.id);
      ts.filter(t => !(t.blockIds||[]).some(bid => dayBlockIds.includes(bid))).forEach(t => {
        html += `<div class="time-chip ${t.category} ${isTaskDone(t,ds)?'done':''}"
          onclick="event.stopPropagation();openTaskDetail('${t.id}')">${h(t.title)}${t.scheduledTime?` <span style="opacity:.7">${t.scheduledTime}${t.scheduledEndTime?'–'+t.scheduledEndTime:''}</span>`:''}</div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }
  html += `</div></div>`;
  con.innerHTML = html;
}

// ── Day ──
const HOUR_H = 60; // px per hour

function taskEndMin(t) {
  if (t.scheduledEndTime) {
    const [eh, em] = t.scheduledEndTime.split(':').map(Number);
    return eh * 60 + em;
  }
  const [sh, sm] = t.scheduledTime.split(':').map(Number);
  const scaleMin = { large: 120, medium: 90, small: 60 };
  return sh * 60 + sm + (scaleMin[t.scale] || 60);
}

function layoutColumns(tasks) {
  const sorted = [...tasks].sort((a, b) => {
    const [ah, am] = a.scheduledTime.split(':').map(Number);
    const [bh, bm] = b.scheduledTime.split(':').map(Number);
    return (ah*60+am) - (bh*60+bm);
  });
  const colEnds = [];
  const result = [];
  sorted.forEach(t => {
    const [sh, sm] = t.scheduledTime.split(':').map(Number);
    const startMin = sh * 60 + sm;
    const endMin = taskEndMin(t);
    let col = colEnds.findIndex(e => e <= startMin);
    if (col === -1) { col = colEnds.length; colEnds.push(endMin); }
    else colEnds[col] = endMin;
    result.push({ t, col });
  });
  const totalCols = colEnds.length || 1;
  return result.map(r => ({ ...r, totalCols }));
}

function renderDay(con) {
  const ds = dateStr(S.calDate);
  const allDay = [...new Map(
    S.tasks.filter(t => !t.scheduledTime && (
      t.dueDate===ds || (t.scheduledDate===ds && !t.recurrence) ||
      (t.recurrence && isOccurrenceOnDate(t, ds))
    ))
           .map(t=>[t.id,t])
  ).values()];
  const timed = S.tasks.filter(t =>
    t.scheduledTime && (
      (t.scheduledDate===ds && !t.recurrence) ||
      (t.recurrence && isOccurrenceOnDate(t, ds))
    )
  );

  let html = `<div class="time-view-wrap">`;

  // All-day row
  if (allDay.length) {
    html += `<div style="padding:6px 10px;background:var(--bg);border-bottom:2px solid var(--border)">
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px">終日</div>`;
    allDay.forEach(t => {
      html += `<div class="time-chip ${t.category} ${isTaskDone(t,ds)?'done':''}"
        style="display:inline-block;margin:1px 2px"
        onclick="openTaskDetail('${t.id}')">${h(t.title)}</div>`;
    });
    html += `</div>`;
  }

  // Time column + task area
  html += `<div style="display:flex">`;

  // Time labels (left column)
  html += `<div style="width:50px;flex-shrink:0">`;
  for (let hh=0; hh<24; hh++) {
    html += `<div style="height:${HOUR_H}px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
      padding:2px 4px;font-size:10px;color:var(--text-muted);background:var(--bg)">${pad(hh)}:00</div>`;
  }
  html += `</div>`;

  // Task area
  html += `<div class="day-task-area" style="height:${24*HOUR_H}px" onclick="dayAreaClick(event,'${ds}')">`;

  // Hour grid lines
  for (let hh=0; hh<24; hh++) {
    html += `<div style="position:absolute;top:${hh*HOUR_H}px;left:0;right:0;
      border-bottom:1px solid var(--border);pointer-events:none;height:${HOUR_H}px"></div>`;
    html += `<div style="position:absolute;top:${hh*HOUR_H+HOUR_H/2}px;left:0;right:0;
      border-bottom:1px dashed #e9eef4;pointer-events:none"></div>`;
  }

  // Current time indicator
  const now = new Date();
  if (ds === dateStr(now)) {
    const nowTop = ((now.getHours()*60+now.getMinutes())/60)*HOUR_H;
    html += `<div style="position:absolute;top:${nowTop}px;left:0;right:0;
      border-top:2px solid #ef4444;z-index:3;pointer-events:none">
      <div style="width:8px;height:8px;background:#ef4444;border-radius:50%;
        margin-top:-5px;margin-left:-4px"></div></div>`;
  }

  // 作業枠（ブロック）
  const dayBlocks = S.blocks.filter(b => b.date === ds)
    .sort((a,b) => a.startTime.localeCompare(b.startTime));
  dayBlocks.forEach(b => {
    const [sh, sm] = b.startTime.split(':').map(Number);
    const [eh, em] = b.endTime.split(':').map(Number);
    const top    = (sh*60+sm) / 60 * HOUR_H;
    const height = Math.max(36, (eh*60+em - sh*60-sm) / 60 * HOUR_H);
    const bTasks = getBlockTasks(b.id);
    const doneCnt = bTasks.filter(t => isTaskDone(t, ds)).length;
    html += `<div class="day-block" style="top:${top}px;height:${height}px"
      onclick="event.stopPropagation();openBlockModal('${b.id}')">
      <div class="day-block-hdr">
        <span>${h(b.title || '作業枠')}</span>
        <span class="day-block-time">${b.startTime}–${b.endTime}
          ${bTasks.length?`(${doneCnt}/${bTasks.length})`:''}</span>
      </div>
      ${bTasks.map(t=>`<div class="day-block-task ${isTaskDone(t,ds)?'done-t':''}">${h(t.title)}</div>`).join('')}
    </div>`;
  });

  // 作業枠なし・scheduledTime あり（スタンドアロン）タスク
  const dayBlockIds = S.blocks.filter(b => b.date === ds).map(b => b.id);
  const standalone = timed.filter(t => !(t.blockIds||[]).some(bid => dayBlockIds.includes(bid)));
  layoutColumns(standalone).forEach(({ t, col, totalCols }) => {
    const [sh, sm] = t.scheduledTime.split(':').map(Number);
    const startMin = sh * 60 + sm;
    const endMin   = Math.min(taskEndMin(t), 24*60);
    const top    = (startMin / 60) * HOUR_H;
    const height = Math.max(22, ((endMin - startMin) / 60) * HOUR_H);
    const wPct   = 100 / totalCols;
    const timeRange = t.scheduledTime + (t.scheduledEndTime ? '–'+t.scheduledEndTime : '');
    const isDone = isTaskDone(t, ds);
    const recurBadge = t.recurrence ? `<span style="font-size:9px;opacity:.7">🔁${recurLabel(t)}</span>` : '';
    const clickAction = t.recurrence
      ? `toggleCompletion('${t.id}','${ds}');renderCalendar()`
      : `openScheduleModal('${t.id}')`;

    html += `<div class="day-task-block ${t.category} ${isDone?'done':''}"
      style="top:${top}px;height:${height}px;left:calc(${col*wPct}% + 3px);width:calc(${wPct}% - 6px)"
      onclick="event.stopPropagation();${clickAction}"
      title="${t.recurrence?'クリックで完了切替':'クリックで時刻編集'}">
      <div class="dtb-title">${h(t.title)} ${recurBadge}</div>
      <div class="dtb-time">${timeRange}</div>
      <span class="dtb-detail" onclick="event.stopPropagation();openTaskDetail('${t.id}')" title="タスク詳細">📋</span>
    </div>`;
  });

  html += `</div>`; // day-task-area
  html += `</div>`; // flex
  html += `</div>`; // time-view-wrap

  con.innerHTML = html;

  // Scroll to first block/task or current hour
  const firstBlockHour = dayBlocks.length ? parseInt(dayBlocks[0].startTime) : 99;
  const firstTaskHour  = standalone.length ? Math.min(...standalone.map(t => parseInt(t.scheduledTime))) : 99;
  const scrollHour = Math.min(firstBlockHour, firstTaskHour);
  con.scrollTop = (scrollHour < 99 ? Math.max(0, scrollHour - 1) : Math.max(0, now.getHours() - 1)) * HOUR_H;
}

function dayAreaClick(e, ds) {
  if (e.target !== e.currentTarget) return;
  const y = e.clientY - e.currentTarget.getBoundingClientRect().top;
  const totalMin = Math.floor(y / HOUR_H * 60 / 15) * 15;
  const hh = Math.min(23, Math.floor(totalMin / 60));
  const mm = totalMin % 60;
  const end = hh * 60 + mm + 60;
  openBlockModal(null, ds, `${pad(hh)}:${pad(mm)}`, `${pad(Math.min(23,Math.floor(end/60)))}:${pad(end%60)}`);
}

function renderGoalGrid() {
  const done   = S.goals.filter(g=>g.status==='done').length;
  const inProg = S.goals.filter(g=>g.status==='inProgress').length;
  const total  = S.goals.length;

  document.getElementById('goal-count').textContent = `${done} / 100 達成`;
  document.getElementById('goal-progress-fill').style.width = `${done}%`;
  document.getElementById('goal-stats').textContent =
    `登録 ${total}件 ／ 達成 ${done}件 ／ 進行中 ${inProg}件 ／ 未着手 ${total-done-inProg}件`;

  if (S.goalView === 'list') {
    renderGoalByGroup();
  } else {
    const con = document.getElementById('goal-grid');
    con.className = 'goals-grid';
    const map = new Map(S.goals.map(g=>[g.number,g]));
    let html = '';
    for (let i=1; i<=100; i++) {
      const g = map.get(i);
      if (g) {
        html += `<div class="goal-cell ${g.status}" onclick="openGoalDetail('${g.id}')">
          <div class="goal-cell-num">${i}</div>
          <div class="goal-cell-title">${h(g.title)}</div>
        </div>`;
      } else {
        html += `<div class="goal-cell" onclick="openAddGoalModal(${i})">
          <div class="goal-cell-num">${i}</div>
          <div style="font-size:14px;color:#cbd5e1;line-height:1">+</div>
        </div>`;
      }
    }
    con.innerHTML = html;
  }
}

function setGoalView(v) {
  S.goalView = v;
  document.getElementById('goal-view-grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('goal-view-list-btn').classList.toggle('active', v === 'list');
  renderGoalGrid();
}

function renderGoalByGroup() {
  const con = document.getElementById('goal-grid');
  con.className = '';
  const STATUS_ICON  = { notStarted: '○', inProgress: '◐', done: '✓' };
  const STATUS_LABEL = { notStarted: '未着手', inProgress: '進行中', done: '達成' };
  const STATUS_BADGE = { notStarted: 'ns-b',  inProgress: 'prog-b',  done: 'done-b' };

  // Group: category → theme → goals[]
  const CAT_ORDER = ['仕事', '個人', 'その他'];
  const catMap = new Map();
  for (const g of S.goals) {
    const cat   = g.category || 'その他';
    const theme = g.theme    || '（テーマなし）';
    if (!catMap.has(cat)) catMap.set(cat, new Map());
    const themeMap = catMap.get(cat);
    if (!themeMap.has(theme)) themeMap.set(theme, []);
    themeMap.get(theme).push(g);
  }

  let html = '';
  const cats = [...CAT_ORDER.filter(c => catMap.has(c)),
                ...[...catMap.keys()].filter(c => !CAT_ORDER.includes(c))];

  if (cats.length === 0) {
    html = `<div style="color:var(--text-muted);text-align:center;padding:40px;font-size:13px">目標がまだありません。<br>「＋ 目標を追加」から登録してください。</div>`;
    con.innerHTML = html;
    return;
  }

  for (const cat of cats) {
    const themeMap = catMap.get(cat);
    // count stats for this category
    const allG = [...themeMap.values()].flat();
    const doneC = allG.filter(g=>g.status==='done').length;
    html += `<div class="goal-group-cat">
      <div class="goal-group-cat-header">
        <span>${h(cat)}</span>
        <span style="font-size:11px;font-weight:400;color:var(--text-muted);margin-left:auto">${doneC}/${allG.length} 達成</span>
      </div>`;

    // Sort themes: named themes first, then （テーマなし）
    const themeKeys = [...themeMap.keys()].sort((a,b) => {
      if (a === '（テーマなし）') return 1;
      if (b === '（テーマなし）') return -1;
      return a.localeCompare(b, 'ja');
    });

    for (const theme of themeKeys) {
      const goals = themeMap.get(theme).slice().sort((a,b)=>a.number-b.number);
      const doneT = goals.filter(g=>g.status==='done').length;
      html += `<div class="goal-group-theme">
        <div class="goal-group-theme-header">
          <span>${theme === '（テーマなし）' ? '<span style="color:#94a3b8">テーマなし</span>' : h(theme)}</span>
          <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${doneT}/${goals.length} 達成</span>
        </div>`;
      for (const g of goals) {
        html += `<div class="goal-list-item ${g.status}" onclick="openGoalDetail('${g.id}')">
          <span class="goal-list-num">#${g.number}</span>
          <span class="goal-list-status">${STATUS_ICON[g.status]}</span>
          <span class="goal-list-title">${h(g.title)}</span>
          <span class="goal-list-badge ${STATUS_BADGE[g.status]}">${STATUS_LABEL[g.status]}</span>
        </div>`;
      }
      html += `</div>`; // goal-group-theme
    }
    html += `</div>`; // goal-group-cat
  }

  con.innerHTML = html;
}

function openTaskDetail(id) {
  const t = S.tasks.find(t=>t.id===id);
  if (!t) return;
  const goal = t.goalId ? S.goals.find(g=>g.id===t.goalId) : null;
  const scaleCls = t.scale==='large'?'badge-scale-large':t.scale==='medium'?'badge-scale-medium':'badge-scale-small';

  document.getElementById('task-detail-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">タイトル</span><strong style="font-size:13px">${h(t.title)}</strong></div>
    <div class="detail-row"><span class="detail-label">カテゴリ</span><span class="badge badge-${t.category==='work'?'work':'personal'}">${t.category==='work'?'仕事':'個人'}</span></div>
    <div class="detail-row"><span class="detail-label">優先度</span><span class="badge badge-${t.priority}">${PRIORITY_LABEL[t.priority]}</span></div>
    <div class="detail-row"><span class="detail-label">規模</span><span class="badge ${scaleCls}">${SCALE_LABEL[t.scale]}</span></div>
    ${t.theme?`<div class="detail-row"><span class="detail-label">テーマ</span><span class="badge badge-theme">${h(t.theme)}</span></div>`:''}
    ${t.dueDate?`<div class="detail-row"><span class="detail-label">期日</span>${t.dueDate}</div>`:''}
    ${t.scheduledDate?`<div class="detail-row"><span class="detail-label">作業予定</span>${t.scheduledDate}${t.scheduledTime?' '+t.scheduledTime+(t.scheduledEndTime?' – '+t.scheduledEndTime:''):''}</div>`:''}
    ${goal?`<div class="detail-row"><span class="detail-label">紐づき目標</span><span class="badge badge-goal">🎯#${goal.number} ${h(goal.title)}</span></div>`:''}
    ${t.recurrence?`<div class="detail-row"><span class="detail-label">繰り返し</span><span class="badge badge-recur">🔁${recurLabel(t)}${t.recurrenceEnd?' （〜'+t.recurrenceEnd+'）':''}</span></div>`:''}
    ${(()=>{
      if (!t.recurrence) {
        return `<div class="detail-row"><span class="detail-label">状態</span>${t.completed?'<span style="color:var(--personal);font-weight:600">✓ 完了</span>':'<span style="color:var(--text-muted)">未完了</span>'}</div>`;
      }
      const allDates = getOccurrenceDates(t);
      const doneCnt  = allDates.filter(d => isRecurringDone(t.id, d)).length;
      const pct      = allDates.length ? Math.round(doneCnt / allDates.length * 100) : 0;
      const fullyDone = doneCnt === allDates.length && allDates.length > 0;
      const DAY = ['日','月','火','水','木','金','土'];
      const rows = allDates.map(ds => {
        const done = isRecurringDone(t.id, ds);
        const dn   = DAY[new Date(ds+'T12:00:00').getDay()];
        return `<div class="recur-date-row ${done?'recur-done-row':''}"
                     onclick="toggleCompletion('${t.id}','${ds}');openTaskDetail('${t.id}')">
          <span class="recur-chk">${done?'☑':'☐'}</span>
          <span class="recur-date-label">${ds}（${dn}）</span>
        </div>`;
      }).join('');
      return `
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-weight:600;font-size:13px">完了状況</span>
            <span style="font-size:12px;color:${fullyDone?'var(--goal-done)':'var(--text-muted)'}">
              ${fullyDone?'✓ すべて完了':doneCnt+'/'+allDates.length+' 完了'}
            </span>
          </div>
          <div class="progress-bar" style="margin-bottom:8px">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="recur-date-list">${rows}</div>
        </div>`;
    })()}
  `;

  const btn = document.getElementById('td-complete-btn');
  if (t.recurrence) {
    btn.style.display = 'none'; // 繰り返しタスクはチェックリストで操作
  } else {
    btn.style.display = '';
    btn.textContent = t.completed ? '未完了に戻す' : '完了にする';
    btn.onclick = () => { toggleComplete(id); closeAllModals(); renderAll(); };
  }
  document.getElementById('td-edit-btn').onclick = () => { closeAllModals(); openEditModal(id); };
  document.getElementById('modal-task-detail').classList.add('open');
}

function openEditModal(id) {
  const t = S.tasks.find(t=>t.id===id);
  if (!t) return;
  document.getElementById('edit-task-form-id') && (document.getElementById('edit-task-form-id').value = id);
  // store id in a hidden field — we'll use a closure instead
  document.getElementById('edit-title').value    = t.title;
  document.getElementById('edit-due-date').value = t.dueDate || '';
  document.getElementById('edit-category').value = t.category;
  document.getElementById('edit-priority').value = t.priority;
  document.getElementById('edit-scale').value    = t.scale;
  buildThemeSelect('edit-theme', t.category, t.theme || '');
  document.getElementById('edit-theme-group').style.display = t.category==='work' ? '' : 'none';
  buildGoalSelect('edit-goal', t.goalId || '');
  document.getElementById('edit-recur').value = t.recurrence || '';
  document.getElementById('edit-recur-end').value = t.recurrenceEnd || '';
  toggleRecurEnd('edit');

  // Store which task we're editing
  document.getElementById('modal-task-edit').dataset.editId = id;
  document.getElementById('modal-task-edit').classList.add('open');
}

function saveEditTask() {
  const id = document.getElementById('modal-task-edit').dataset.editId;
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { showToast('タスク名を入力してください'); return; }
  const cat = document.getElementById('edit-category').value;
  updateTask(id, {
    title,
    dueDate:   document.getElementById('edit-due-date').value || null,
    category:  cat,
    priority:  document.getElementById('edit-priority').value,
    scale:     document.getElementById('edit-scale').value,
    theme:         cat==='work' ? (document.getElementById('edit-theme').value || null) : null,
    goalId:        document.getElementById('edit-goal').value || null,
    recurrence:    document.getElementById('edit-recur').value || null,
    recurrenceEnd: document.getElementById('edit-recur-end').value || null,
  });

  renderAll();
  showToast('更新しました');
}

  const start = document.getElementById('sched-time').value;

  const [hh, mm] = start.split(':').map(Number);

  endEl.value = `${pad(end.getHours())}:${pad(end.getMinutes())}`;
}

function addTaskToBlock(blockId) {
  const sel = document.getElementById('bm-add-task');
  if (!sel || !sel.value) { showToast('タスクを選択してください'); return; }
  linkTaskToBlock(sel.value, blockId);
  renderAll();
  openBlockModal(blockId);
}

function saveBlock() {
  const date  = document.getElementById('bm-date').value;
  const start = document.getElementById('bm-start').value;
  const end   = document.getElementById('bm-end').value;
  if (!date)  { showToast('日付を入力してください'); return; }
  if (!start) { showToast('開始時刻を入力してください'); return; }
  if (!end)   { showToast('終了時刻を入力してください'); return; }
  if (end <= start) { showToast('終了時刻は開始時刻より後にしてください'); return; }
  const title = document.getElementById('bm-title').value.trim();
  const theme = document.getElementById('bm-theme').value.trim();
  if (_blockEditId) {
    updateBlock(_blockEditId, { title, theme, date, startTime: start, endTime: end });
    showToast('作業枠を更新しました');
  } else {
    const newId = addBlock({ title, theme, date, startTime: start, endTime: end });
    if (_blockPendingTaskId) { linkTaskToBlock(_blockPendingTaskId, newId); }
    showToast('作業枠を追加しました');
  }
  closeAllModals();
  renderAll();
}

function confirmDeleteBlock() {
  if (!_blockEditId) return;
  if (confirm('この作業枠を削除しますか？（紐づくタスクのリンクも解除されます）')) {
    deleteBlock(_blockEditId);
    closeAllModals();
    renderAll();
    showToast('作業枠を削除しました');
  }
}

function saveGistToken() {
  const token = document.getElementById('gist-token-input').value.trim();
  const id    = document.getElementById('gist-id-input').value.trim();
  if (!token) { showToast('トークンを入力してください'); return; }

  showToast('設定を保存しました');
  renderSettings();
}

// トークンを使ってGist一覧から todo_app_data.json を探してIDを自動取得
async function gistFindId() {
  const token = document.getElementById('gist-token-input').value.trim()
    || localStorage.getItem('todo_gist_token');
  if (!token) { showToast('先にトークンを入力してください'); return; }
  try {
    showToast('検索中...');
    const res = await fetch('https://api.github.com/gists?per_page=100', {
      headers: { Authorization: `token ${token}` },
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const list = await res.json();
    const found = list.find(g => g.files && g.files['todo_app_data.json']);
    if (!found) { showToast('Gistが見つかりません。先にPCで「保存」してください'); return; }
    localStorage.setItem('todo_gist_id', found.id);
    document.getElementById('gist-id-input').value = found.id;
    showToast('✅ Gist IDを取得しました');
    renderSettings();
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

async function gistPush() {
  const token  = localStorage.getItem('todo_gist_token');
  const gistId = localStorage.getItem('todo_gist_id');
  if (!token) { showToast('先にトークンを設定してください'); openSettings(); return; }

  const content = JSON.stringify({
    tasks: S.tasks, goals: S.goals, blocks: S.blocks,
    completions: S.completions, themes: S.themes,
  }, null, 2);

  const payload = {
    description: 'TODO App Data',
    public: false,
    files: { 'todo_app_data.json': { content } },
  };

  try {
    showToast('保存中...');
    const res = await fetch(
      gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists',
      {
        method: gistId ? 'PATCH' : 'POST',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }
    );
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const data = await res.json();
    if (!gistId) localStorage.setItem('todo_gist_id', data.id);
    showToast('☁️ クラウドに保存しました');
    renderSettings();
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

async function gistPull() {
  const token  = localStorage.getItem('todo_gist_token');
  const gistId = localStorage.getItem('todo_gist_id');
  if (!token)  { showToast('先にトークンを設定してください'); openSettings(); return; }
  if (!gistId) { showToast('「🔍 検索」ボタンでGist IDを取得してください'); openSettings(); return; }

  try {
    showToast('読込中...');
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}` },
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
    const data = await res.json();
    const raw  = data.files['todo_app_data.json']?.content;
    if (!raw) throw new Error('ファイルが見つかりません');
    const d = JSON.parse(raw);
    if (!Array.isArray(d.tasks)) throw new Error('データ形式が不正です');
    if (d.tasks)       S.tasks       = d.tasks;
    if (d.goals)       S.goals       = d.goals;
    if (d.blocks)      S.blocks      = d.blocks;
    if (d.completions) S.completions = d.completions;
    if (d.themes)      S.themes      = d.themes;
    saveTasks(); saveGoals(); saveBlocks(); saveCompletions(); saveThemes();
    renderAll();
    showToast('☁️ クラウドから読み込みました');
  } catch (e) {
    showToast('エラー: ' + e.message);
  }
}

function exportDayICS() {
  const ds = dateStr(S.calDate);
  const fmtJST = (d, time) => d.replace(/-/g,'') + 'T' + time.replace(':','') + '00';
  const scaleMin = { large: 120, medium: 90, small: 60 };

  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TODO App//JA\r\nCALSCALE:GREGORIAN\r\n';
  ics += 'BEGIN:VTIMEZONE\r\nTZID:Asia/Tokyo\r\nBEGIN:STANDARD\r\n';
  ics += 'TZOFFSETFROM:+0900\r\nTZOFFSETTO:+0900\r\nTZNAME:JST\r\nDTSTART:19700101T000000\r\n';
  ics += 'END:STANDARD\r\nEND:VTIMEZONE\r\n';

  let count = 0;

  // 作業枠 → 1枠 = 1イベント（タスク名をDESCRIPTIONに列挙）
  S.blocks.filter(b => b.date === ds).forEach(b => {
    const bTasks = getBlockTasks(b.id);
    const summary = b.title || '作業枠';
    const desc = bTasks.length ? bTasks.map(t => t.title).join('\\n') : '';
    ics += 'BEGIN:VEVENT\r\n';
    ics += `SUMMARY:${summary.replace(/\r?\n/g,'\\n')}\r\n`;
    ics += `DTSTART;TZID=Asia/Tokyo:${fmtJST(ds, b.startTime)}\r\n`;
    ics += `DTEND;TZID=Asia/Tokyo:${fmtJST(ds, b.endTime)}\r\n`;
    if (desc) ics += `DESCRIPTION:${desc}\r\n`;
    if (b.theme) ics += `CATEGORIES:${b.theme}\r\n`;
    ics += 'END:VEVENT\r\n';
    count++;
  });

  // スタンドアロン（この日のblockに紐づかない・scheduledTime あり）タスク
  const icsBlockIds = S.blocks.filter(b => b.date === ds).map(b => b.id);
  const standalones = S.tasks.filter(t => !(t.blockIds||[]).some(bid=>icsBlockIds.includes(bid)) && t.scheduledTime && (
    (t.scheduledDate===ds && !t.recurrence) ||
    (t.recurrence && isOccurrenceOnDate(t, ds))
  ));
  standalones.forEach(t => {
    const startFmt = fmtJST(ds, t.scheduledTime);
    let endTime = t.scheduledEndTime && t.scheduledEndTime > t.scheduledTime ? t.scheduledEndTime : null;
    if (!endTime) {
      const [sh, sm] = t.scheduledTime.split(':').map(Number);
      const totalEnd = sh * 60 + sm + (scaleMin[t.scale] || 60);
      endTime = `${pad(Math.floor(totalEnd/60) % 24)}:${pad(totalEnd % 60)}`;
    }
    const priLabel = PRIORITY_LABEL[t.priority] || '';
    const catLabel = t.category==='work' ? '仕事' : '個人';
    let desc = `優先度:${priLabel} / ${catLabel}`;
    if (t.theme) desc += ` / ${t.theme}`;
    ics += 'BEGIN:VEVENT\r\n';
    ics += `SUMMARY:${t.title.replace(/\r?\n/g,'\\n')}\r\n`;
    ics += `DTSTART;TZID=Asia/Tokyo:${startFmt}\r\n`;
    ics += `DTEND;TZID=Asia/Tokyo:${fmtJST(ds, endTime)}\r\n`;
    ics += `DESCRIPTION:${desc}\r\n`;
    if (t.theme) ics += `CATEGORIES:${t.theme}\r\n`;
    ics += 'END:VEVENT\r\n';
    count++;
  });

  if (!count) { showToast('出力できるスケジュールがありません'); return; }
  ics += 'END:VCALENDAR';

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `schedule_${ds.replace(/-/g,'')}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('ICSファイルを出力しました');
}

// ──────────────────────────────────────────────
//  JSON IMPORT / EXPORT
// ──────────────────────────────────────────────
function exportJSON() {
  const d = new Date();
  const data = { tasks: S.tasks, goals: S.goals, blocks: S.blocks, completions: S.completions, themes: S.themes, exportedAt: d.toISOString() };
  const json = JSON.stringify(data, null, 2);
  const filename = `todo_backup_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;

  // iOS Safari は a.click() でダウンロードできないため、両対応
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // iOS Safari 用フォールバック: ダウンロードできない場合はテキスト表示
  setTimeout(() => {
    // ダウンロードが始まったかどうかは検知できないため、モーダルも表示
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px';
      ov.innerHTML = `<div style="background:#fff;border-radius:12px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;font-size:14px">📤 バックアップデータ</span>
          <button onclick="this.closest('div[style]').remove()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#64748b">×</button>
        </div>
        <div style="padding:10px 14px;font-size:11px;color:#64748b">長押し → 「テキストをコピー」でバックアップできます</div>
        <textarea readonly style="flex:1;margin:0 14px 14px;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:10px;font-family:monospace;resize:none;min-height:200px;-webkit-user-select:text;user-select:text">${json.replace(/</g,'&lt;')}</textarea>
      </div>`;
      document.body.appendChild(ov);
    }
  }, 300);

  showToast('エクスポートしました');
}

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.tasks)) throw new Error();
      S.tasks       = data.tasks;
      S.goals       = data.goals       || [];
      S.blocks      = data.blocks      || [];
      S.completions = data.completions || [];
      if (data.themes) S.themes = data.themes;
      saveTasks(); saveGoals(); saveBlocks(); saveCompletions(); saveThemes();
      renderAll();
      showToast('インポートしました');
    } catch { alert('不正なJSONファイルです'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ──────────────────────────────────────────────
//  PAGE NAV
// ──────────────────────────────────────────────
function showPage(page) {
  S.page = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page===page));
  if (page==='goals') renderGoalGrid();
}

// モバイル用パネル切替（タスク ↔ スケジューラー）
function switchMobilePanel(panel) {
  const todoPnl = document.getElementById('panel-todo');
  const calPnl  = document.getElementById('panel-calendar');
  const tabs    = document.querySelectorAll('.mobile-tab');
  if (panel === 'todo') {
    todoPnl.classList.remove('mobile-hidden');
    calPnl.classList.add('mobile-hidden');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
  } else {
    todoPnl.classList.add('mobile-hidden');
    calPnl.classList.remove('mobile-hidden');
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    renderCalendar();
  }
}

// ──────────────────────────────────────────────
//  FORM: ADD TASK
// ──────────────────────────────────────────────
function handleAddTask(e) {
  e.preventDefault();
  const title = document.getElementById('task-title').value.trim();
  if (!title) return;
  const cat = document.getElementById('task-category').value;
  addTask({
    title,
    dueDate:  document.getElementById('task-due-date').value || null,
    category: cat,
    priority: document.getElementById('task-priority').value,
    scale:    document.getElementById('task-scale').value,
    theme:         cat==='work' ? (document.getElementById('task-theme').value || null) : null,
    goalId:        document.getElementById('task-goal').value || null,
    recurrence:    document.getElementById('task-recur').value || null,
    recurrenceEnd: document.getElementById('task-recur-end').value || null,
  });
  document.getElementById('task-title').value = '';
  renderAll();
  showToast('タスクを追加しました');
}

// ──────────────────────────────────────────────
//  FILTERS
// ──────────────────────────────────────────────
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const ft = chip.dataset.ft, fv = chip.dataset.fv;
    document.querySelectorAll(`.filter-chip[data-ft="${ft}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    S.filter[ft] = fv;
    renderTodoList();
  });
});

// ──────────────────────────────────────────────
//  MODAL: close on overlay click
// ──────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target===overlay) closeAllModals(); });
});

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
function init() {
  loadAll();
  buildThemeSelect('task-theme', 'work', '');
  buildGoalSelect('task-goal', '');
  renderAll();
}

init();
</script>
